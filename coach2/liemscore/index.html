/* --- THEMES (from liem_piano_coach.html) --- */
        :root {
            --bg-app: #f3f4f6; --bg-panel: #ffffff; --text: #111827; --text-light:#6b7280;
            --primary:#2563eb; --accent:#10b981; --danger:#ef4444; --warn:#f59e0b;
            --border:#e5e7eb; --shadow: 0 18px 45px rgba(15, 23, 42, 0.12), 0 6px 18px rgba(15, 23, 42, 0.10);
            --radius: 14px;
        }
        body.theme-retro { --bg-app:#e8e4d9; --bg-panel:#fdf6e3; --text:#5c4b37; --text-light:#7a6a56; --primary:#b58900; --accent:#cb4b16; --border:#e2d7c4; }
        body.theme-ocean { --bg-app:#e0f7fa; --bg-panel:#ffffff; --text:#006064; --text-light:#3b7f86; --primary:#0288d1; --accent:#00bfa5; --border:#cfe8ec; }
        body.theme-coder { --bg-app:#0d1117; --bg-panel:#161b22; --text:#c9d1d9; --text-light:#8b949e; --primary:#58a6ff; --accent:#238636; --border:#30363d; }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--bg-app) !important;
            color: var(--text) !important;
            overflow: hidden;
        }

        /* QuickScore theme bridge (convert Tailwind colors â†’ CSS vars) */
        .qs-app { color: var(--text); }
        .qs-app .bg-white { background: var(--bg-panel) !important; }
        .qs-app .bg-slate-50, .qs-app .bg-slate-100 { background: rgba(0,0,0,0.03) !important; }
        body.theme-coder .qs-app .bg-slate-50, body.theme-coder .qs-app .bg-slate-100 { background: rgba(255,255,255,0.06) !important; }

        /* Tailwind arbitrary color used in preview container */
        .qs-app .bg-\[\#F8FAFC\] { background: rgba(0,0,0,0.02) !important; }
        body.theme-coder .qs-app .bg-\[\#F8FAFC\] { background: rgba(255,255,255,0.04) !important; }

        .qs-app .border-slate-100,
        .qs-app .border-slate-200,
        .qs-app .border-slate-300,
        .qs-app .border-slate-200 { border-color: var(--border) !important; }

        .qs-app .text-slate-900,
        .qs-app .text-slate-800,
        .qs-app .text-slate-700 { color: var(--text) !important; }
        .qs-app .text-slate-600,
        .qs-app .text-slate-500,
        .qs-app .text-slate-400 { color: var(--text-light) !important; }

        /* Map indigo brand to theme primary */
        .qs-app .bg-indigo-600 { background-color: var(--primary) !important; }
        .qs-app .text-indigo-700,
        .qs-app .text-indigo-600,
        .qs-app .text-indigo-500 { color: var(--primary) !important; }
        .qs-app .bg-indigo-50 { background-color: rgba(37,99,235,0.10) !important; }
        body.theme-coder .qs-app .bg-indigo-50 { background-color: rgba(88,166,255,0.14) !important; }
        body.theme-retro .qs-app .bg-indigo-50 { background-color: rgba(181,137,0,0.14) !important; }
        body.theme-ocean .qs-app .bg-indigo-50 { background-color: rgba(2,136,209,0.12) !important; }

        /* Make cards feel lighter + roomier */
        .qs-app .rounded-xl { border-radius: var(--radius) !important; }
        .qs-app .rounded-2xl { border-radius: calc(var(--radius) + 6px) !important; }
        .qs-app .shadow-sm, .qs-app .shadow-md, .qs-app .shadow-lg, .qs-app .shadow-2xl { box-shadow: var(--shadow) !important; }

        /* Slightly nicer focus ring */
        .qs-app *:focus { outline: none; }
        .qs-app input:focus, .qs-app select:focus, .qs-app textarea:focus, .qs-app button:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
            border-color: rgba(37, 99, 235, 0.35) !important;
        }
        body.theme-retro .qs-app input:focus, body.theme-retro .qs-app select:focus, body.theme-retro .qs-app textarea:focus, body.theme-retro .qs-app button:focus {
            box-shadow: 0 0 0 4px rgba(181, 137, 0, 0.18);
            border-color: rgba(181, 137, 0, 0.45) !important;
        }
        body.theme-ocean .qs-app input:focus, body.theme-ocean .qs-app select:focus, body.theme-ocean .qs-app textarea:focus, body.theme-ocean .qs-app button:focus {
            box-shadow: 0 0 0 4px rgba(2, 136, 209, 0.16);
            border-color: rgba(2, 136, 209, 0.45) !important;
        }
        body.theme-coder .qs-app input:focus, body.theme-coder .qs-app select:focus, body.theme-coder .qs-app textarea:focus, body.theme-coder .qs-app button:focus {
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.20);
            border-color: rgba(88, 166, 255, 0.55) !important;
        }

        /* Softer hover for primary buttons (tailwind hover:bg-indigo-700) */
        .qs-app .hover\:bg-indigo-700:hover { filter: brightness(0.95); }
        .qs-app .hover\:bg-indigo-100:hover { filter: brightness(0.98); }

/* ABCJS rendering polish */
        .abcjs-wrap svg { width: 100% !important; height: auto !important; display: block; }
        .abcjs-wrap svg * { shape-rendering: geometricPrecision; }

        /* Playback highlight */
        .abcjs-wrap .note-played path,
        .abcjs-wrap .note-played text,
        .abcjs-wrap .note-played {
            fill: var(--accent) !important;
            stroke: var(--accent) !important;
            opacity: 1 !important;
        }
        .abcjs-wrap .note-current path,
        .abcjs-wrap .note-current text,
        .abcjs-wrap .note-current {
            fill: var(--primary) !important;
            stroke: var(--primary) !important;
            opacity: 1 !important;
        }

        .abcjs-wrap .note-range path,
        .abcjs-wrap .note-range text,
        .abcjs-wrap .note-range {
            fill: rgba(59, 130, 246, 0.58);
            stroke: rgba(59, 130, 246, 0.58);
            opacity: 0.72;
        }
        .abcjs-wrap .note-range-start path,
        .abcjs-wrap .note-range-start text,
        .abcjs-wrap .note-range-start {
            fill: #f59e0b;
            stroke: #f59e0b;
            opacity: 0.98;
        }
        .abcjs-wrap .note-range-start-peer path,
        .abcjs-wrap .note-range-start-peer text,
        .abcjs-wrap .note-range-start-peer {
            fill: #fbbf24;
            stroke: #fbbf24;
            opacity: 0.84;
        }
        .abcjs-wrap .note-range-end path,
        .abcjs-wrap .note-range-end text,
        .abcjs-wrap .note-range-end {
            fill: #ef4444;
            stroke: #ef4444;
            opacity: 0.98;
        }
        .abcjs-wrap .note-range-end-peer path,
        .abcjs-wrap .note-range-end-peer text,
        .abcjs-wrap .note-range-end-peer {
            fill: #fb7185;
            stroke: #fb7185;
            opacity: 0.84;
        }

            auth: {

    window.AppServices = Object.assign({}, window.AppServices || {}, { supabaseClient });
})();

    function tFor(lang, key) {

    function installI18nRuntime() {

        const translatedPropKeys = ['title', 'placeholder', 'aria-label', 'alt', 'label'];

        React.createElement = function (type, props, ...children) {
            const lang = window.__APP_LANG || 'vi';
            if (lang !== 'vi') {
                if (props && typeof props === 'object') {
                    let changed = false;
                    const nextProps = {};
                    for (const key in props) nextProps[key] = props[key];

                    for (const key of translatedPropKeys) {
                        const value = nextProps[key];
                        if (typeof value === 'string' && (VN_DIACRITIC_RE.test(value) || (I18N_PHRASES[lang] && I18N_PHRASES[lang][value]))) {
                            nextProps[key] = translateText(value, lang);
                            changed = true;
                        }
                    }

                    if (changed) props = nextProps;
                }

                if (children && children.length) {
                    children = children.map((child) => {
                        if (typeof child === 'string' && (VN_DIACRITIC_RE.test(child) || (I18N_PHRASES[lang] && I18N_PHRASES[lang][child]))) {
                            return translateText(child, lang);
                        }
                        return child;
                    });
                }
            }

            return originalCreateElement.call(React, type, props, ...children);
        };

        const originalAlert = window.alert;
        window.alert = function (message) {
            const lang = window.__APP_LANG || 'vi';
            const nextMessage = (typeof message === 'string' && lang !== 'vi') ? translateText(message, lang) : message;
            return originalAlert(nextMessage);
        };

        const originalConfirm = window.confirm;
        window.confirm = function (message) {
            const lang = window.__APP_LANG || 'vi';
            const nextMessage = (typeof message === 'string' && lang !== 'vi') ? translateText(message, lang) : message;
            return originalConfirm(nextMessage);
        };
    }

    installI18nRuntime();

    window.AppI18n = {
        I18N,
        I18N_PHRASES,
        VN_DIACRITIC_RE,
        translateText,
        tFor,
        setLanguage,
        syncDocumentLanguage,
        installI18nRuntime,

    <script data-source="src/utils/music-utils.js">
(function () {
    function parseFraction(value) {
        const text = String(value || '').trim();
        if (!text) return null;
        const match = text.match(/^(\d+)\s*\/\s*(\d+)$/);
        if (!match) return null;

        const numerator = parseInt(match[1], 10);
        const denominator = parseInt(match[2], 10);
        if (!Number.isFinite(numerator) || !Number.isFinite(denominator) || denominator === 0) {
            return null;
        }

        return numerator / denominator;
    }

    function parseLengthSuffix(lengthText) {
        const text = String(lengthText || '').trim();
        if (!text) return 1;
        if (text === '/') return 0.5;
        if (text === '//') return 0.25;
        if (/^\d+$/.test(text)) return parseInt(text, 10);
        if (/^\/\d+$/.test(text)) return 1 / parseInt(text.slice(1), 10);
        if (/^\d+\/\d+$/.test(text)) {
            const parts = text.split('/');
            return parseInt(parts[0], 10) / parseInt(parts[1], 10);
        }
        if (/^\d+\/$/.test(text)) return parseInt(text, 10) / 2;
        return null;
    }

    function tokenDurationWhole(token, baseLengthWhole) {
        const raw = String(token || '').trim();
        if (!raw) return 0;

        const normalized = raw.replace(/[()]/g, '').replace(/-+$/g, '');
        let match = normalized.match(/^\[[^\]]+\]([0-9\/]+|\/\/|\/)?$/);
        if (match) {
            const factor = parseLengthSuffix(match[1] || '');
            return factor == null ? null : (baseLengthWhole * factor);
        }

        match = normalized.match(/^z([0-9\/]+|\/\/|\/)?$/);
        if (match) {
            const factor = parseLengthSuffix(match[1] || '');
            return factor == null ? null : (baseLengthWhole * factor);
        }

        match = normalized.match(/^(?:\^{1,2}|_{1,2}|=)?[A-Ga-g][,']*([0-9\/]+|\/\/|\/)?$/);
        if (match) {
            const factor = parseLengthSuffix(match[1] || '');
            return factor == null ? null : (baseLengthWhole * factor);
        }

        return 0;
    }

    window.AppMusicUtils = {
        parseFraction,
        parseLengthSuffix,
        tokenDurationWhole,
    };
})();

    </script>

    <script data-source="src/hooks/ui-hooks.js">
(function () {
    const { useEffect } = React;

    function useDismissibleLayer(isOpen, selector, onDismiss) {
        useEffect(() => {
            if (!isOpen) return undefined;

            const handlePointerDown = (event) => {
                const element = event.target;
                const root = element && element.closest ? element.closest(selector) : null;
                if (root) return;
                onDismiss();
            };

            const handleKeyDown = (event) => {
                if (event.key === 'Escape') onDismiss();
            };

            document.addEventListener('mousedown', handlePointerDown);
            document.addEventListener('keydown', handleKeyDown);
            return () => {
                document.removeEventListener('mousedown', handlePointerDown);
                document.removeEventListener('keydown', handleKeyDown);
            };
        }, [isOpen, selector, onDismiss]);
    }

    function useEscapeToClose(isOpen, onDismiss) {
        useEffect(() => {
            if (!isOpen) return undefined;

            const handleKeyDown = (event) => {
                if (event.key === 'Escape') onDismiss();
            };

            document.addEventListener('keydown', handleKeyDown);
            return () => document.removeEventListener('keydown', handleKeyDown);
        }, [isOpen, onDismiss]);
    }

    window.AppHooks = {
        useDismissibleLayer,
        useEscapeToClose,
    };
})();

    <script data-source="src/hooks/use-library-feature.js">
(function () {
    const { useState, useRef, useEffect, useCallback } = React;

    function useLibraryFeature(options) {
        const {
            supabaseClient,
            showToast,
            editorState,
            editorActions,
            editorConfig,
            resetEditorToDefault,
        } = options;

        const {
            abcText,
            title,
            composer,
            meter,
            tempo,
            keyTonic,
            keyMode,
            keySigInput,
            keySigDirty,
            lang,
            theme,
            duration,
            isDotted,
            activeVoice,
            voices,
        } = editorState;

        const {
            setTitle,
            setComposer,
            setMeter,
            setTempo,
            setKeyTonic,
            setKeyMode,
            setKeySigInput,
            setKeySigDirty,
            setLang,
            setTheme,
            setDuration,
            setIsDotted,
            setActiveVoice,
            applyTextChange,
            syncVoicesFromText,
        } = editorActions;

        const {
            DEFAULT_ABC,
            KEY_SIG_HINT,
            THEMES,
            DURATION_ORDER,
            buildKeyString,
            getHeaderValue,
            parseKeyLine,
        } = editorConfig;

        const [sessionChecked, setSessionChecked] = useState(false);
        const [currentUser, setCurrentUser] = useState(null);
        const [showAuthModal, setShowAuthModal] = useState(false);
        const [showAccountMenu, setShowAccountMenu] = useState(false);
        const [showLibraryMenu, setShowLibraryMenu] = useState(false);
        const [librarySearch, setLibrarySearch] = useState('');
        const [showSaveChoiceModal, setShowSaveChoiceModal] = useState(false);
        const [authMode, setAuthMode] = useState('signin');
        const [authEmail, setAuthEmail] = useState('');
        const [authPassword, setAuthPassword] = useState('');
        const [authBusy, setAuthBusy] = useState(false);
        const [authError, setAuthError] = useState('');
        const [authInfo, setAuthInfo] = useState('');
        const [passwordRecoveryReady, setPasswordRecoveryReady] = useState(false);
        const [libraryItems, setLibraryItems] = useState([]);
        const [libraryBusy, setLibraryBusy] = useState(false);
        const [currentSongId, setCurrentSongId] = useState('');
        const [cloudBusy, setCloudBusy] = useState(false);
        const [cloudDirty, setCloudDirty] = useState(false);
        const [lastCloudSavedAt, setLastCloudSavedAt] = useState('');
        const cloudSnapshotRef = useRef('');

        const clearLinkedSong = useCallback(() => {
            setCurrentSongId('');
            setLastCloudSavedAt('');
            cloudSnapshotRef.current = '';
        }, []);

        const openAuthModal = useCallback((mode = 'signin') => {
            setShowAccountMenu(false);
            setAuthMode(mode);
            setAuthError('');
            setAuthInfo('');
            setPasswordRecoveryReady(false);
            setShowAuthModal(true);
        }, []);

        const closeAuthModal = useCallback(() => {
            setShowAuthModal(false);
            setShowAccountMenu(false);
            setAuthError('');
            setAuthInfo('');
            setAuthPassword('');
            setPasswordRecoveryReady(false);
        }, []);

        const formatLibraryTime = useCallback((iso) => {
            if (!iso) return '';
            try {
                return new Date(iso).toLocaleString('en-GB', {
                    hour: '2-digit',
                    minute: '2-digit',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                });
            } catch (error) {
                return iso;
            }
        }, []);

        const filteredLibraryItems = libraryItems.filter((song) => {
            const query = String(librarySearch || '').trim().toLowerCase();
            if (!query) return true;
            const haystack = `${song?.title || ''} ${song?.composer || ''}`.toLowerCase();
            return haystack.includes(query);
        });

        const buildSongPayload = useCallback(() => {
            const parsedTempo = parseInt(String(tempo || '').trim(), 10);
            const keyValue = getHeaderValue(abcText, 'K') || buildKeyString(keyTonic, keyMode);

            return {
                title: String(title || '').trim() || 'New Song',
                composer: String(composer || '').trim(),
                meter: String(meter || '').trim() || '4/4',
                tempo_bpm: Number.isFinite(parsedTempo) ? parsedTempo : null,
                key_signature: String(keyValue || '').trim() || 'C',
                abc_text: String(abcText || DEFAULT_ABC),
                editor_state: {
                    lang,
                    theme,
                    duration,
                    isDotted,
                    activeVoice,
                    voices,
                    keyTonic,
                    keyMode,
                    keySigInput,
                    keySigDirty,
                },
            };
        }, [
            DEFAULT_ABC,
            abcText,
            activeVoice,
            buildKeyString,
            composer,
            duration,
            getHeaderValue,
            isDotted,
            keyMode,
            keySigDirty,
            keySigInput,
            keyTonic,
            lang,
            meter,
            tempo,
            theme,
            title,
            voices,
        ]);

        const buildSongSnapshot = useCallback((songLike) => {
            if (!songLike) return '';
            return JSON.stringify({
                title: String(songLike.title || '').trim(),
                composer: String(songLike.composer || '').trim(),
                meter: String(songLike.meter || '').trim(),
                tempo_bpm: songLike.tempo_bpm == null ? null : Number(songLike.tempo_bpm),
                key_signature: String(songLike.key_signature || '').trim(),
                abc_text: String(songLike.abc_text || ''),
                editor_state: JSON.stringify(songLike.editor_state || {}),
            });
        }, []);

        const markSongSaved = useCallback((songLike) => {
            setCurrentSongId(songLike?.id || '');
            setLastCloudSavedAt(songLike?.updated_at || '');
            cloudSnapshotRef.current = buildSongSnapshot(songLike);
        }, [buildSongSnapshot]);

        const isFreshDefaultScore = useCallback(() => {
            return (
                String(abcText || '').trim() === String(DEFAULT_ABC).trim() &&
                String(title || '').trim() === 'New Song' &&
                String(composer || '').trim() === 'Composer' &&
                String(meter || '').trim() === '4/4' &&
                String(tempo || '').trim() === '120' &&
                String(keyTonic || '').trim() === 'C' &&
                String(keyMode || '').trim() === 'major'
            );
        }, [DEFAULT_ABC, abcText, composer, keyMode, keyTonic, meter, tempo, title]);

        const fetchLibrary = useCallback(async (userId) => {
            if (!supabaseClient || !userId) {
                setLibraryItems([]);
                return;
            }

            setLibraryBusy(true);
            try {
                const { data, error } = await supabaseClient
                    .from('songs')
                    .select('id, title, composer, updated_at')
                    .eq('user_id', userId)
                    .order('updated_at', { ascending: false });

                if (error) throw error;
                setLibraryItems(Array.isArray(data) ? data : []);
            } catch (error) {
                console.error('Load library failed', error);
                showToast('Could not load your library.');
            } finally {
                setLibraryBusy(false);
            }
        }, [showToast, supabaseClient]);

        const applySongToEditor = useCallback((song) => {
            const nextText = String(song?.abc_text || '').trim() ? String(song.abc_text) : DEFAULT_ABC;
            const editorSnapshot = (song && song.editor_state && typeof song.editor_state === 'object') ? song.editor_state : {};

            setTitle(song?.title || 'New Song');
            setComposer(song?.composer || 'Composer');
            setMeter(song?.meter || '4/4');
            setTempo(song?.tempo_bpm ? String(song.tempo_bpm) : '120');

            const keyParsed = parseKeyLine(song?.key_signature || getHeaderValue(nextText, 'K') || 'C');
            if (keyParsed && keyParsed.tonic) {
                setKeyTonic(keyParsed.tonic);
                setKeyMode(keyParsed.mode);
                setKeySigInput(keyParsed.sigInput || KEY_SIG_HINT);
                setKeySigDirty(!!keyParsed.sigDirty);
            } else {
                setKeyTonic('C');
                setKeyMode('major');
                setKeySigInput(KEY_SIG_HINT);
                setKeySigDirty(false);
            }

            if (editorSnapshot.lang) setLang(editorSnapshot.lang);
            if (editorSnapshot.theme && THEMES.includes(editorSnapshot.theme)) setTheme(editorSnapshot.theme);
            if (editorSnapshot.duration && DURATION_ORDER.includes(String(editorSnapshot.duration))) setDuration(String(editorSnapshot.duration));
            if (typeof editorSnapshot.isDotted === 'boolean') setIsDotted(editorSnapshot.isDotted);
            if (typeof editorSnapshot.activeVoice === 'number') setActiveVoice(editorSnapshot.activeVoice);

            applyTextChange(nextText, nextText.length, { focus: false, skipHistory: true });
            setTimeout(() => {
                try { syncVoicesFromText(nextText); } catch (error) {}
            }, 0);

            markSongSaved({
                id: song?.id || '',
                updated_at: song?.updated_at || '',
                title: song?.title || 'New Song',
                composer: song?.composer || '',
                meter: song?.meter || '4/4',
                tempo_bpm: song?.tempo_bpm ?? null,
                key_signature: song?.key_signature || 'C',
                abc_text: nextText,
                editor_state: editorSnapshot,
            });
        }, [
            DEFAULT_ABC,
            DURATION_ORDER,
            KEY_SIG_HINT,
            THEMES,
            applyTextChange,
            getHeaderValue,
            markSongSaved,
            parseKeyLine,
            setActiveVoice,
            setComposer,
            setDuration,
            setIsDotted,
            setKeyMode,
            setKeySigDirty,
            setKeySigInput,
            setKeyTonic,
            setLang,
            setMeter,
            setTempo,
            setTheme,
            setTitle,
            syncVoicesFromText,
        ]);

        const loadSongFromLibrary = useCallback(async (songId) => {
            if (!supabaseClient || !currentUser || !songId) return;

            setLibraryBusy(true);
            try {
                const { data, error } = await supabaseClient
                    .from('songs')
                    .select('*')
                    .eq('id', songId)
                    .eq('user_id', currentUser.id)
                    .single();

                if (error) throw error;
                applySongToEditor(data);
                showToast('Song loaded from Library.');
            } catch (error) {
                console.error('Load song failed', error);
                showToast('Could not open this song.');
            } finally {
                setLibraryBusy(false);
            }
        }, [applySongToEditor, currentUser, showToast, supabaseClient]);

        const handleLibrarySelect = useCallback(async (songId) => {
            if (!songId) {
                clearLinkedSong();
                return;
            }
            if (songId === currentSongId) {
                setShowLibraryMenu(false);
                return;
            }
            if (cloudDirty) {
                const ok = window.confirm('You have unsaved changes. Opening another song will discard them. Continue?');
                if (!ok) return;
            }
            await loadSongFromLibrary(songId);
            setShowLibraryMenu(false);
        }, [clearLinkedSong, cloudDirty, currentSongId, loadSongFromLibrary]);

        const handleForgotPassword = useCallback(async () => {
            if (!supabaseClient) {
                setAuthError('Account service is not ready yet.');
                return;
            }

            const email = String(authEmail || '').trim();
            if (!email) {
                setAuthError('Enter your email first to receive a reset link.');
                return;
            }

            setAuthBusy(true);
            setAuthError('');
            setAuthInfo('');
            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + window.location.pathname,
                });
                if (error) throw error;
                setAuthInfo('Reset instructions have been sent to your email. Open the email and follow the link.');
            } catch (error) {
                console.error('Reset password failed', error);
                setAuthError(error?.message ? String(error.message) : 'Could not send the reset email.');
            } finally {
                setAuthBusy(false);
            }
        }, [authEmail, supabaseClient]);

        const handleAuthSubmit = useCallback(async () => {
            if (!supabaseClient) {
                setAuthError('Account service is not ready yet.');
                return;
            }

            const email = String(authEmail || '').trim();
            const password = String(authPassword || '');

            if (authMode !== 'recovery' && !email) {
                setAuthError('Please enter your email.');
                return;
            }
            if (!password) {
                setAuthError(authMode === 'recovery' ? 'Please enter your new password.' : 'Please enter your password.');
                return;
            }
            if (password.length < 6) {
                setAuthError('Password should be at least 6 characters.');
                return;
            }

            setAuthBusy(true);
            setAuthError('');
            setAuthInfo('');
            try {
                if (authMode === 'signup') {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: {
                            emailRedirectTo: window.location.origin + window.location.pathname,
                        },
                    });
                    if (error) throw error;
                    if (data?.session?.user) {
                        showToast('Account created.');
                        closeAuthModal();
                    } else {
                        setAuthInfo('Your account has been created. Please check your email, confirm it, then sign in.');
                    }
                } else if (authMode === 'recovery') {
                    const { error } = await supabaseClient.auth.updateUser({ password });
                    if (error) throw error;
                    setPasswordRecoveryReady(false);
                    setAuthMode('signin');
                    setAuthPassword('');
                    if (typeof window !== 'undefined' && window.history?.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname + window.location.search);
                    }
                    showToast('Password updated.');
                    closeAuthModal();
                } else {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    showToast('Signed in.');
                    closeAuthModal();
                }
            } catch (error) {
                console.error('Auth failed', error);
                setAuthError(error?.message ? String(error.message) : 'Could not complete your request.');
            } finally {
                setAuthBusy(false);
            }
        }, [authEmail, authMode, authPassword, closeAuthModal, showToast, supabaseClient]);

        const handleSignOut = useCallback(async () => {
            setShowAccountMenu(false);
            setShowLibraryMenu(false);
            setLibrarySearch('');
            if (!supabaseClient) return;

            setCloudBusy(true);
            try {
                const { error } = await supabaseClient.auth.signOut({ scope: 'local' });
                if (error) throw error;
            } catch (error) {
                console.error('Sign out failed', error);
                showToast('Could not sign out.');
            } finally {
                setCloudBusy(false);
            }
        }, [showToast, supabaseClient]);

        const handleResetText = useCallback(() => {
            const ok = window.confirm('Reset the score to the default ABC? This will replace the current content.');
            if (!ok) return;
            resetEditorToDefault({ skipHistory: false });
            setShowLibraryMenu(false);
            setLibrarySearch('');
            clearLinkedSong();
        }, [clearLinkedSong, resetEditorToDefault]);

        const handleNewLibraryDraft = useCallback(() => {
            if (cloudDirty) {
                const ok = window.confirm('You have unsaved changes. Creating a new song will discard them. Continue?');
                if (!ok) return;
            }
            resetEditorToDefault({ skipHistory: false });
            setShowLibraryMenu(false);
            setLibrarySearch('');
            clearLinkedSong();
            showToast('New draft created.');
        }, [clearLinkedSong, cloudDirty, resetEditorToDefault, showToast]);

        const performSaveToLibrary = useCallback(async (saveMode = 'new') => {
            if (!currentUser) {
                openAuthModal('signin');
                showToast('Sign in to save to Library.');
                return;
            }
            if (!supabaseClient) {
                showToast('Library is not ready yet.');
                return;
            }

            const payload = buildSongPayload();
            setCloudBusy(true);
            try {
                let response;
                if (saveMode === 'overwrite' && currentSongId) {
                    response = await supabaseClient
                        .from('songs')
                        .update(payload)
                        .eq('id', currentSongId)
                        .eq('user_id', currentUser.id)
                        .select('*')
                        .single();
                } else {
                    response = await supabaseClient
                        .from('songs')
                        .insert({ ...payload, user_id: currentUser.id })
                        .select('*')
                        .single();
                }

                const { data, error } = response;
                if (error) throw error;

                markSongSaved(data);
                await fetchLibrary(currentUser.id);
                setShowSaveChoiceModal(false);
                setShowLibraryMenu(false);
                showToast(saveMode === 'overwrite' ? 'Song updated in Library.' : 'Song saved to Library.');
            } catch (error) {
                console.error('Save library failed', error);
                showToast(error?.message ? String(error.message) : 'Could not save to Library.');
            } finally {
                setCloudBusy(false);
            }

        const handleSaveToLibrary = useCallback(async () => {
            if (!currentUser) {
                openAuthModal('signin');
                showToast('Sign in to save to Library.');
                return;
            }
            if (currentSongId) {
                setShowSaveChoiceModal(true);
                return;
            }
            await performSaveToLibrary('new');
        }, [currentSongId, currentUser, openAuthModal, performSaveToLibrary, showToast]);

        const handleDeleteLibrarySong = useCallback(async (songId) => {
            if (!currentUser || !supabaseClient || !songId) return;
            const song = libraryItems.find((item) => item.id === songId);
            const ok = window.confirm(`Delete "${song?.title || 'this song'}" from your Library?`);
            if (!ok) return;

            setCloudBusy(true);
            try {
                const { error } = await supabaseClient
                    .from('songs')
                    .delete()
                    .eq('id', songId)
                    .eq('user_id', currentUser.id);
                if (error) throw error;

                if (songId === currentSongId) {
                    clearLinkedSong();
                }

                await fetchLibrary(currentUser.id);
                setLibrarySearch('');
                showToast('Song deleted from Library.');
            } catch (error) {
                console.error('Delete song failed', error);
                showToast(error?.message ? String(error.message) : 'Could not delete this song.');
            } finally {
                setCloudBusy(false);
            }

                    if (!active) return;
                    const user = data?.session?.user || null;

                    if (user?.email) setAuthEmail(user.email);
                    if (user?.id) await fetchLibrary(user.id);
                } catch (error) {
                    console.error('Session init failed', error);
                } finally {
                    if (active) setSessionChecked(true);
                }
            };
            init();

            const recoveryLinkActive = typeof window !== 'undefined' && (window.location.hash || '').includes('type=recovery');
            if (recoveryLinkActive) {
                setPasswordRecoveryReady(true);
                setAuthMode('recovery');
                setShowAuthModal(true);
                setAuthError('');
                setAuthInfo('Reset link confirmed. Enter your new password.');
            }

            const { data: authListener } = supabaseClient.auth.onAuthStateChange(async (event, session) => {
                const user = session?.user || null;

                setSessionChecked(true);
                setAuthPassword('');

                if (user?.email) setAuthEmail(user.email);

                if (event === 'PASSWORD_RECOVERY') {
                    setPasswordRecoveryReady(true);
                    setAuthMode('recovery');
                    setShowAccountMenu(false);
                    setShowAuthModal(true);
                    setAuthError('');
                    setAuthInfo('Reset link confirmed. Enter your new password.');
                }

                if (user?.id) {
                    await fetchLibrary(user.id);
                } else {
                    setLibraryItems([]);
                    clearLinkedSong();
                }

                if (event === 'SIGNED_OUT') {
                    setPasswordRecoveryReady(false);

            };

        useEffect(() => {
            if (!showAuthModal) return undefined;

            return () => document.removeEventListener('keydown', onKey);
        }, [closeAuthModal, showAuthModal]);

        useEffect(() => {
            if (!currentUser) {

                return;
            }
            if (!currentSongId) {
                setCloudDirty(!isFreshDefaultScore());
                return;
            }

            setCloudDirty(nextSnapshot !== cloudSnapshotRef.current);
        }, [
            buildSongPayload,
            buildSongSnapshot,
            currentSongId,
            currentUser,
            isFreshDefaultScore,

        return {

            showLibraryMenu,

            authInfo,

            passwordRecoveryReady,

            libraryItems,
            filteredLibraryItems,
            libraryBusy,
            currentSongId,
            cloudBusy,
            cloudDirty,
            lastCloudSavedAt,
            openAuthModal,
            closeAuthModal,
            formatLibraryTime,
            handleLibrarySelect,
            handleForgotPassword,
            handleAuthSubmit,
            handleSignOut,
            handleResetText,
            handleNewLibraryDraft,
            performSaveToLibrary,
            handleSaveToLibrary,
            handleDeleteLibrarySong,
        };
    }

    window.AppFeatureHooks = Object.assign({}, window.AppFeatureHooks || {}, {
        useLibraryFeature,
    });
})();

    <script type="text/babel" data-source="src/components/mini-abc-preview.jsx">
const AppComponents = window.AppComponents || (window.AppComponents = {});

const MiniAbcPreview = ({ abc }) => {
            const ref = React.useRef(null);

            React.useEffect(() => {
                if (!ref.current) return;
                ref.current.innerHTML = '';

                if (!window.ABCJS || !abc) return;

                try {
                    window.ABCJS.renderAbc(ref.current, abc, {
                        responsive: 'resize',
                        staffwidth: 112,
                        paddingtop: 0,
                        paddingbottom: 0,
                        paddingleft: 0,
                        paddingright: 0,
                        add_classes: false,
                        scale: 0.75,
                    });
                    const svg = ref.current.querySelector('svg');
                    if (svg) {
                        svg.style.display = 'block';
                        svg.style.width = '100%';
                        svg.style.height = 'auto';
                    }
                } catch (err) {
                    ref.current.innerHTML = '<div style="padding:6px 4px;font-size:11px;color:#64748b;font-family:monospace;">preview</div>';
                }
            }, [abc]);

            return (
                <div className="w-[118px] min-h-[34px] shrink-0 overflow-hidden rounded-md border border-slate-100 bg-white px-1 py-0.5">
                    <div ref={ref} className="pointer-events-none" />
                </div>
            );
        };

AppComponents.MiniAbcPreview = MiniAbcPreview;

    </script>

            </button>

            <div className="relative z-[9999]" data-account-root>
                <button
                    onClick={() => setShowAccountMenu((value) => !value)}
                    className="h-9 pl-3 pr-2 text-sm font-medium rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 transition-all flex items-center gap-2 max-w-[180px]"
                    title={currentUser ? (currentUser.email || 'User') : 'Account'}
                >
                    <span className={`w-2 h-2 rounded-full shrink-0 ${currentUser ? (cloudDirty ? 'bg-amber-400' : 'bg-emerald-400') : 'bg-slate-300'}`}></span>

                        <div className="px-4 py-3 bg-slate-50 border-b border-slate-100">

                                className="w-full text-left px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50 transition-all"

                                >
                                    Create account
                                </button>
                            </div>

                    </div>
                )}
            </div>
        </div>

    window.AppComponents = window.AppComponents || {};

                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter') {
                                                    e.preventDefault();
                                                    handleAuthSubmit();
                                                }
                                            }}
                                        />
                                    </div>
                                </div>

                                {authError && (
                                    <div className="text-[12px] text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                                        {authError}
                                    </div>
                                )}

                                {authInfo && (
                                    <div className="text-[12px] text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 leading-relaxed">
                                        {authInfo}
                                    </div>
                                )}

                                {authMode === 'signin' && (
                                    <div className="flex items-center justify-between gap-3 text-[12px]">
                                        <button
                                            onClick={handleForgotPassword}
                                            disabled={authBusy}
                                            className="text-indigo-600 hover:text-indigo-700 font-medium transition-all disabled:opacity-50"
                                        >
                                            Forgot password?
                                        </button>
                                        <div className="text-slate-400">We will send a password reset email.</div>
                                    </div>
                                )}

                                {authMode === 'recovery' && passwordRecoveryReady && (
                                    <div className="text-[12px] text-indigo-700 bg-indigo-50 border border-indigo-200 rounded-lg px-3 py-2 leading-relaxed">
                                        Your reset link has been confirmed. Enter a new password and save it.
                                    </div>
                                )}

                                <div className="flex items-center justify-end gap-2 pt-1">
                                    <button
                                        onClick={closeAuthModal}
                                        className="px-4 py-2 text-sm font-medium rounded-lg border border-slate-200 bg-white hover:bg-slate-50 transition-all"
                                    >
                                        Close
                                    </button>
                                    <button
                                        onClick={handleAuthSubmit}
                                        disabled={authBusy}
                                        className={`px-4 py-2 text-sm font-medium rounded-lg transition-all ${authBusy ? 'bg-indigo-300 text-white cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-md shadow-indigo-200'}`}
                                    >
                                        {authBusy ? 'Workingâ€¦' : (authMode === 'recovery' ? 'Save new password' : (authMode === 'signin' ? 'Sign in' : 'Create account'))}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </>
        );
    };

    window.AppComponents = window.AppComponents || {};
    window.AppComponents.CloudModals = CloudModals;
})();

    </script>

    <script type="text/babel" data-source="src/app.jsx">
const { useState, useEffect, useRef, useCallback } = React;
const {
    Music,
    Play,
    Pause,
    Square,
    Plus,
    Settings,
    XIcon,
    Edit3,
    AlignLeft,
    Layers,
    CopyIcon,
    Check,
    DownloadIcon,
    GlobeIcon,
    PaletteIcon,
    RestQuarterIcon,
    RestEighthIcon,
    RestSixteenthIcon,
    RestThirtySecondIcon,
    UndoIcon,
    RedoIcon,
    RotateCcwIcon,
    SparklesIcon,
} = window.AppIcons;
const {
    DEFAULT_ABC,
    OCTAVES,
    NOTES,
    KEY_TONICS,
    buildKeyString,
    KEY_SIG_HINT,
    SHARP_ORDER,
    FLAT_ORDER,
    MAJOR_BY_SHARPS,
    MAJOR_BY_FLATS,
    MINOR_BY_SHARPS,
    MINOR_BY_FLATS,
    SYMBOLS,
    TUPLET_MENU_DEFS,
    DECORATION_MENU_DEFS,
    NoteIcon,
} = window.AppConstants;
const { MiniAbcPreview, CloudControls, CloudModals } = window.AppComponents;
const { supabaseClient } = window.AppServices;
const { useDismissibleLayer, useEscapeToClose } = window.AppHooks;
const { useLibraryFeature } = window.AppFeatureHooks;
const { tFor, setLanguage, syncDocumentLanguage } = window.AppI18n;

function App() {
            const [abcText, setAbcText] = useState(DEFAULT_ABC);
            const [abcjsLoaded, setAbcjsLoaded] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const [cursorPos, setCursorPos] = useState(0);
            const [loopEnabled, setLoopEnabled] = useState(false);
            const [rangeSelection, setRangeSelection] = useState(null);
            const [rangeMenu, setRangeMenu] = useState({ visible: false, x: 0, y: 0, target: null });

            // Import + Background overlay (PDF/Image as reference)
            const fileInputRef = useRef(null);
            const [importBusy, setImportBusy] = useState(false);
            const [bgPages, setBgPages] = useState([]); // [{ src, x, y, scale }]
            const [bgPageIndex, setBgPageIndex] = useState(0);
            const [bgOpacity, setBgOpacity] = useState(0.42);
            const [bgLocked, setBgLocked] = useState(true);

            // Global Editor State
            const [title, setTitle] = useState('New Song');
            const [composer, setComposer] = useState('Composer');
            const [meter, setMeter] = useState('4/4');
            const [duration, setDuration] = useState(() => {
                try { return localStorage.getItem('qs_dur_v1') || '4'; } catch (e) { return '4'; }
            });
            const [isDotted, setIsDotted] = useState(() => {
                try { return localStorage.getItem('qs_dotted_v1') === '1'; } catch (e) { return false; }
            });
            const [tempo, setTempo] = useState('120');

            // Key Signature
            const [keyTonic, setKeyTonic] = useState('C');
            const [keyMode, setKeyMode] = useState('major'); // 'major' | 'minor'

            const [keySigInput, setKeySigInput] = useState(KEY_SIG_HINT);
            const [keySigDirty, setKeySigDirty] = useState(false);

            // Optimize menu
            const [showOptimizeMenu, setShowOptimizeMenu] = useState(false);
            const [showAutoBarlinePreview, setShowAutoBarlinePreview] = useState(false);
            const [autoBarlineBefore, setAutoBarlineBefore] = useState('');
            const [autoBarlineAfter, setAutoBarlineAfter] = useState('');

            // Export & Language
            const [showExportMenu, setShowExportMenu] = useState(false);
            const [lang, setLang] = useState('vi'); // vi | en | jp

            // Theme (Retro / Ocean / Dark)
            const THEMES = ['retro','ocean','coder']; // coder theme is labeled as Dark in UI
            const [theme, setTheme] = useState(() => {
                try { return localStorage.getItem('qs_theme_v1') || 'coder'; } catch (e) { return 'coder'; }
            });
            useEffect(() => {
                try {
                    document.body.classList.remove('theme-retro','theme-ocean','theme-coder');
                    document.body.classList.add('theme-' + theme);
                    localStorage.setItem('qs_theme_v1', theme);
                } catch (e) {}
            }, [theme]);



            // --- Duration Brush (Trường độ) helpers + persistence ---
            const DURATION_ORDER = ['1','2','4','8','16','32']; // whole → 32nd
            const durationToPretty = (d) => {
                if (d === '1') return '1';
                if (d === '2') return '1/2';
                if (d === '4') return '1/4';
                if (d === '8') return '1/8';
                if (d === '16') return '1/16';
                if (d === '32') return '1/32';
                return d || '';
            };
            const getLengthStrFor = (durVal, dottedVal) => {
                // L:1/4 assumed (default in this app)
                let lengthStr = '';
                if (durVal === '1') lengthStr = dottedVal ? '6' : '4';
                else if (durVal === '2') lengthStr = dottedVal ? '3' : '2';
                else if (durVal === '4') lengthStr = dottedVal ? '3/2' : '';
                else if (durVal === '8') lengthStr = dottedVal ? '3/4' : '/2';
                else if (durVal === '16') lengthStr = dottedVal ? '3/8' : '/4';
                else if (durVal === '32') lengthStr = dottedVal ? '3/16' : '/8';
                return lengthStr;
            };

            // Persist duration brush across refresh
            useEffect(() => {
                try {
                    localStorage.setItem('qs_dur_v1', duration);
                    localStorage.setItem('qs_dotted_v1', isDotted ? '1' : '0');
                } catch (e) {}
            }, [duration, isDotted]);

            const durationRef = useRef(duration);
            const dottedRef = useRef(isDotted);
            useEffect(() => { durationRef.current = duration; }, [duration]);
            useEffect(() => { dottedRef.current = isDotted; }, [isDotted]);

            // Duration hotkeys help toggle
            const [showHotkeysHelp, setShowHotkeysHelp] = useState(false);
            const [showHotkeysModal, setShowHotkeysModal] = useState(false);

            // Lightweight toast for hotkey feedback
            const [toast, setToast] = useState(null);
            const toastTimerRef = useRef(null);
            const showToast = useCallback((msg) => {
                if (!msg) return;
                try { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); } catch (e) {}
                setToast(String(msg));
                toastTimerRef.current = setTimeout(() => setToast(null), 900);
            }, []);

            // Double-tap ArrowUp/ArrowDown (outside typing) to step duration
            const arrowTapRef = useRef({ key: null, t: 0 });

            // Hotkeys helpers (refs to avoid stale closures)
            const undoFnRef = useRef(() => {});
            const redoFnRef = useRef(() => {});
            const togglePlayRef = useRef(() => {});
            const stopAudioRef = useRef(() => {});
            const spaceTimerRef = useRef(null);

            // update document lang attr for accessibility
            useEffect(() => {
                try {
                    document.documentElement.lang = (lang === 'en') ? 'en' : (lang === 'jp' ? 'ja' : 'vi');
                } catch (e) {}
            }, [lang]);


            // Voicing State
            const [voices, setVoices] = useState([{ id: 1, clef: 'treble' }]);
            const [activeVoice, setActiveVoice] = useState(1);
            const [showAddVoice, setShowAddVoice] = useState(false);
            const [isCopied, setIsCopied] = useState(false);

            // Long press for accidentals
            const [longPressTarget, setLongPressTarget] = useState(null);
            const pressTimer = useRef(null);

            // Refs
            const textAreaRef = useRef(null);
            const renderAreaRef = useRef(null);
            const rangeMenuRef = useRef(null);
            const previewWrapRef = useRef(null);
            const previewScrollRef = useRef(null);
            const synthRef = useRef(null);

            // Audio playback controller (for repeat + synced cursor)
            const synthControlRef = useRef(null);
            const audioCtxRef = useRef(null);
            const visualObjRef = useRef(null);
            const sequenceRef = useRef(null);
            const noteTimingsRef = useRef([]);
            const audioPreparedRef = useRef(false);
            const lastCurrentElsRef = useRef([]);
            const lastFullLoopBeatRef = useRef(-1);
            const rangeSynthRef = useRef(null);
            const playbackModeRef = useRef(null);
            const loopEnabledRef = useRef(loopEnabled);
            const rangeSelectionRef = useRef(rangeSelection);
            const rangePlaybackRef = useRef({
                preparedKey: null,
                events: [],
                totalMs: 0,
                currentMs: 0,
                pausedMs: 0,
                nextEventIndex: 0,
                running: false,
                startPerfMs: 0,
                rafId: null,
                ignoreEnded: false,
                ending: false,
            });

            // --- UNDO/REDO (tối đa 5 bước) ---
            const MAX_HISTORY = 5;
            const [undoStack, setUndoStack] = useState([]);
            const [redoStack, setRedoStack] = useState([]);

            const abcTextRef = useRef(abcText);
            const cursorPosRef = useRef(cursorPos);
            const undoRef = useRef(undoStack);
            const redoRef = useRef(redoStack);

            useEffect(() => { abcTextRef.current = abcText; }, [abcText]);
            useEffect(() => { cursorPosRef.current = cursorPos; }, [cursorPos]);
            useEffect(() => { undoRef.current = undoStack; }, [undoStack]);
            useEffect(() => { redoRef.current = redoStack; }, [redoStack]);
            useEffect(() => { loopEnabledRef.current = loopEnabled; }, [loopEnabled]);
            useEffect(() => { rangeSelectionRef.current = rangeSelection; }, [rangeSelection]);

            const pushHistory = (prevText, prevCursor) => {
                setUndoStack(prev => {
                    const next = [...prev, { text: prevText, cursor: prevCursor }];
                    return next.length > MAX_HISTORY ? next.slice(next.length - MAX_HISTORY) : next;
                });
                setRedoStack([]);
            };

            const applyTextChange = (newText, newPos, { skipHistory = false, focus = true } = {}) => {
                const prevText = abcTextRef.current;
                const prevCursor = cursorPosRef.current;

                if (!skipHistory && prevText !== newText) {
                    pushHistory(prevText, prevCursor);
                }

                setAbcText(newText);
                setCursorPos(newPos);

                if (focus) {
                    setTimeout(() => {
                        if (textAreaRef.current) {
                            textAreaRef.current.focus();
                            try { textAreaRef.current.setSelectionRange(newPos, newPos); } catch (e) {}
                        }
                    }, 0);
                }
            };

            const handleUndo = () => {
                const u = undoRef.current;
                if (!u || u.length === 0) return;
                const last = u[u.length - 1];
                setUndoStack(u.slice(0, -1));
                setRedoStack(prev => {
                    const next = [...prev, { text: abcTextRef.current, cursor: cursorPosRef.current }];
                    return next.length > MAX_HISTORY ? next.slice(next.length - MAX_HISTORY) : next;
                });
                applyTextChange(last.text, last.cursor, { skipHistory: true, focus: true });
            };

            const handleRedo = () => {
                const r = redoRef.current;
                if (!r || r.length === 0) return;
                const last = r[r.length - 1];
                setRedoStack(r.slice(0, -1));
                setUndoStack(prev => {
                    const next = [...prev, { text: abcTextRef.current, cursor: cursorPosRef.current }];
                    return next.length > MAX_HISTORY ? next.slice(next.length - MAX_HISTORY) : next;
                });
                applyTextChange(last.text, last.cursor, { skipHistory: true, focus: true });
            };

            // --- MENU CHUỘT PHẢI CHO BÈ 2 ---
            const [voiceMenu, setVoiceMenu] = useState({ visible: false, x: 0, y: 0, voiceId: null });

            // Symbol menu (hold to choose variants)
            const [symbolMenu, setSymbolMenu] = useState({ visible: false, x: 0, y: 0, items: [] });
            const symbolHoldTimerRef = useRef(null);
            const symbolHoldOpenedRef = useRef(false);
            const symbolTapRef = useRef({ last: 0, timer: null });
            const [repeatQuickToken, setRepeatQuickToken] = useState(':|');
            const [decoQuickToken, setDecoQuickToken] = useState('!accent!');


            const closeVoiceMenu = () => setVoiceMenu(v => ({ ...v, visible: false }));

            const closeSymbolMenu = () => setSymbolMenu(m => ({ ...m, visible: false, items: [] }));

            const openSymbolMenu = (x, y, items) => {
                // close any pending double-tap timer
                if (symbolTapRef.current.timer) {
                    clearTimeout(symbolTapRef.current.timer);
                    symbolTapRef.current.timer = null;
                }
                symbolTapRef.current.last = 0;

                setSymbolMenu({ visible: true, x, y, items });
            };

            const handleSymbolTapDouble = (onDouble) => {
                const now = Date.now();
                const last = symbolTapRef.current.last || 0;

                // second tap within window -> trigger
                if (now - last < 260) {
                    symbolTapRef.current.last = 0;
                    if (symbolTapRef.current.timer) {
                        clearTimeout(symbolTapRef.current.timer);
                        symbolTapRef.current.timer = null;
                    }
                    onDouble();
                    return;
                }

                // first tap -> wait for second
                symbolTapRef.current.last = now;
                if (symbolTapRef.current.timer) clearTimeout(symbolTapRef.current.timer);
                symbolTapRef.current.timer = setTimeout(() => {
                    symbolTapRef.current.last = 0;
                    symbolTapRef.current.timer = null;
                }, 260);
            };

            const startSymbolHold = (e, items) => {
                symbolHoldOpenedRef.current = false;
                // hold to open variants
                const x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                const y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);

                if (symbolHoldTimerRef.current) clearTimeout(symbolHoldTimerRef.current);
                symbolHoldTimerRef.current = setTimeout(() => {
                    symbolHoldOpenedRef.current = true;
                    openSymbolMenu(x, y, items);
                }, 400);
            };

            const cancelSymbolHold = () => {
                // if hold hasn't fired yet, reset flag
                if (!symbolMenu.visible) symbolHoldOpenedRef.current = false;
                if (symbolHoldTimerRef.current) {
                    clearTimeout(symbolHoldTimerRef.current);
                    symbolHoldTimerRef.current = null;
                }
            };

            const getLengthStrForDuration = () => getLengthStrFor(duration, isDotted);

            const insertRestDefault = () => {
                const len = getLengthStrForDuration();
                insertSmartText('z' + len);
            };

            const wrapSelectionWith = (left, right) => {
                const ta = textAreaRef.current;
                if (!ta) return;

                const start = ta.selectionStart ?? cursorPos;
                const end = ta.selectionEnd ?? cursorPos;

                if (start !== end) {
                    const newText = abcText.slice(0, start) + left + abcText.slice(start, end) + right + abcText.slice(end);
                    const newPos = end + left.length + right.length;
                    applyTextChange(newText, newPos, { focus: false, skipHistory: false });
                    return;
                }

                // no selection -> just insert left
                insertSmartText(left);
            };

            const insertPairedToken = (left, right) => {
                const ta = textAreaRef.current;
                if (!ta) {
                    insertSmartText(left + right);
                    return;
                }

                const start = ta.selectionStart ?? cursorPos;
                const end = ta.selectionEnd ?? cursorPos;

                if (start !== end) {
                    wrapSelectionWith(left, right);
                    return;
                }

                const newText = abcText.slice(0, start) + left + right + abcText.slice(end);
                const newPos = start + left.length;
                applyTextChange(newText, newPos, { focus: true, skipHistory: false });
            };

            const insertLyricsLine = () => {
                const ta = textAreaRef.current;
                const pos = ta ? (ta.selectionStart ?? cursorPos) : cursorPos;
                const src = abcTextRef.current || '';
                const needsNewLine = pos > 0 && src[pos - 1] !== '\n';
                insertSmartText((needsNewLine ? '\n' : '') + 'w: ');
            };

            const runRepeatInsert = (token) => {
                setRepeatQuickToken(token);
                insertSmartText(token);
                closeSymbolMenu();
            };

            const runDecoInsert = (token) => {
                setDecoQuickToken(token);
                insertSmartText(token);
                closeSymbolMenu();
            };

            const barlineMenuItems = [
                { label: '||', title: 'Double barline', onClick: () => { insertSmartText('||'); closeSymbolMenu(); } },
                { label: '|]', title: 'Final barline', onClick: () => { insertSmartText('|]'); closeSymbolMenu(); } },
                { label: '[|', title: 'Left bracket barline', onClick: () => { insertSmartText('[|'); closeSymbolMenu(); } },
            ];

            const repeatMenuItems = [
                { label: '|:', title: 'Repeat start', onClick: () => runRepeatInsert('|:') },
                { label: ':|', title: 'Repeat end', onClick: () => runRepeatInsert(':|') },
                { label: '[1', title: 'First ending', onClick: () => runRepeatInsert('[1') },
                { label: '[2', title: 'Second ending', onClick: () => runRepeatInsert('[2') },
            ];

            const restMenuItems = [
                { label: 'z', title: 'Quarter rest', onClick: () => { insertSmartText('z'); closeSymbolMenu(); } },
                { label: 'z2', title: 'Half rest', onClick: () => { insertSmartText('z2'); closeSymbolMenu(); } },
                { label: 'z/2', title: 'Eighth rest', onClick: () => { insertSmartText('z/2'); closeSymbolMenu(); } },
                { label: 'z/4', title: 'Sixteenth rest', onClick: () => { insertSmartText('z/4'); closeSymbolMenu(); } },
            ];

            const slurMenuItems = [
                { label: '(', title: 'Open slur', onClick: () => { insertSmartText('('); closeSymbolMenu(); } },
                { label: ')', title: 'Close slur', onClick: () => { insertSmartText(')'); closeSymbolMenu(); } },
                { label: '(...)', title: 'Wrap current selection', onClick: () => { wrapSelectionWith('(', ')'); closeSymbolMenu(); } },
            ];

            const rhythmMenuItems = [
                { label: '>', title: 'Broken rhythm to the right', onClick: () => { insertSmartText('>'); closeSymbolMenu(); } },
                { label: '<', title: 'Broken rhythm to the left', onClick: () => { insertSmartText('<'); closeSymbolMenu(); } },
            ];

            const moreMenuItems = [
                { label: '{ }', title: 'Grace notes', onClick: () => { insertPairedToken('{', '}'); closeSymbolMenu(); } },
                { label: 'w:', title: 'Lyrics line', onClick: () => { insertLyricsLine(); closeSymbolMenu(); } },
            ];

            const tupletMenuItems = TUPLET_MENU_DEFS.map((def) => (
                def.header
                    ? { ...def }
                    : {
                        ...def,
                        label: def.token,
                        onClick: () => {
                            insertSmartText(def.token);
                            closeSymbolMenu();
                        }
                    }
            ));

            const decoQuickTokens = ['!accent!', '!fermata!', '!tenuto!', '!trill!', '!p!', '!mf!', '!f!', '!crescendo(!', '!diminuendo(!'];
            const quickDecorationMenuItems = [
                { header: 'Quick' },
                ...decoQuickTokens
                    .map((token) => DECORATION_MENU_DEFS.find((def) => def.token === token))
                    .filter(Boolean)
                    .map((def) => ({
                        ...def,
                        label: def.token,
                        onClick: () => runDecoInsert(def.token),
                    })),
                { header: 'All Decorations' },
                ...DECORATION_MENU_DEFS.map((def) => (
                    def.header
                        ? { ...def }
                        : {
                            ...def,
                            label: def.token,
                            onClick: () => runDecoInsert(def.token),
                        }
                )),
            ];



            // --- Duration apply to current selection (best-effort) ---
            // Rule: if user is selecting music tokens in ABC textarea, hotkey can "apply" duration to selection.
            // Safe guards: skip header lines (X/T/C/M/L/Q/K and V: declarations), protect chord symbols in quotes ("Am").
            const tryApplyDurationToSelection = (durVal, dottedVal) => {
                const ta = textAreaRef.current;
                if (!ta) return false;

                const start = ta.selectionStart ?? cursorPosRef.current;
                const end = ta.selectionEnd ?? cursorPosRef.current;
                if (start === end) return false;

                const src = abcTextRef.current || '';
                const sel = src.slice(start, end);
                const lengthStr = getLengthStrFor(durVal, dottedVal);

                const isHeaderLine = (line) => {
                    const t = (line || '').trimStart();
                    if (/^(X|T|C|M|L|Q|K):/.test(t)) return true;
                    if (/^V:\d+/.test(t)) return true; // V:1 clef=...
                    return false;
                };

                const replaceCore = (s) => {
                    // rests: z, z2, z/2...
                    let out = s.replace(/(^|[^A-Za-z])z(\d+\/\d+|\d+|\/\d+|\/)?/g, (m, pre) => `${pre}z${lengthStr}`);
                    // notes: ^C,,  D'  e/2 ...
                    out = out.replace(/(\^{1,2}|_{1,2}|=)?([A-Ga-g])([,']*)(\d+\/\d+|\d+|\/\d+|\/)?/g,
                        (m, acc, note, oct) => `${acc || ''}${note}${oct || ''}${lengthStr}`
                    );
                    return out;
                };

                const replacePlain = (seg) => {
                    // protect chord symbols in quotes: "Am"
                    let out = '';
                    let i = 0;
                    while (i < seg.length) {
                        const q1 = seg.indexOf('"', i);
                        if (q1 === -1) { out += replaceCore(seg.slice(i)); break; }
                        const q2 = seg.indexOf('"', q1 + 1);
                        if (q2 === -1) { out += replaceCore(seg.slice(i)); break; }
                        out += replaceCore(seg.slice(i, q1));
                        out += seg.slice(q1, q2 + 1);
                        i = q2 + 1;
                    }
                    return out;
                };

                const applyLine = (line) => {
                    if (!line) return line;
                    if (isHeaderLine(line)) return line;

                    let out = '';
                    let i = 0;

                    // scan chords [CEG]2 as atomic unit: keep inside, replace length after ]
                    while (i < line.length) {
                        const open = line.indexOf('[', i);
                        if (open === -1) { out += replacePlain(line.slice(i)); break; }
                        const close = line.indexOf(']', open + 1);
                        if (close === -1) { out += replacePlain(line.slice(i)); break; }

                        out += replacePlain(line.slice(i, open));

                        const chordBody = line.slice(open, close + 1);
                        let j = close + 1;
                        const m = line.slice(j).match(/^(\d+\/\d+|\d+|\/\d+|\/)?/);
                        if (m) j += (m[1] || '').length;

                        out += chordBody + lengthStr;
                        i = j;
                    }

                    return out;

                } catch (err) {}
                bgDragRef.current.active = true;
                bgDragRef.current.startX = e.clientX;
                bgDragRef.current.startY = e.clientY;
                bgDragRef.current.origX = currentBg.x || 0;
                bgDragRef.current.origY = currentBg.y || 0;
                bgDragRef.current.pid = e.pointerId;
                try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
            }, [bgLocked, currentBg]);

            const onBgPointerMove = useCallback((e) => {
                if (bgLocked || !currentBg) return;
                if (!bgDragRef.current.active) return;
                const dx = e.clientX - bgDragRef.current.startX;
                const dy = e.clientY - bgDragRef.current.startY;
                updateCurrentBg({ x: bgDragRef.current.origX + dx, y: bgDragRef.current.origY + dy });
            }, [bgLocked, currentBg, updateCurrentBg]);

            const onBgPointerUp = useCallback((e) => {
                if (!bgDragRef.current.active) return;
                bgDragRef.current.active = false;
                try { if (e && e.currentTarget && bgDragRef.current.pid != null) e.currentTarget.releasePointerCapture(bgDragRef.current.pid); } catch (err) {}
                bgDragRef.current.pid = null;
            }, []);

            const onBgWheel = useCallback((e) => {
                if (bgLocked || !currentBg) return;
                // zoom background with wheel while unlocked
                try { e.preventDefault(); e.stopPropagation(); } catch (err) {}
                const dir = e.deltaY > 0 ? -1 : 1;
                const factor = dir > 0 ? 1.08 : 0.92;
                let next = (currentBg.scale || 1) * factor;
                next = Math.max(0.2, Math.min(4, next));
                updateCurrentBg({ scale: next });
            }, [bgLocked, currentBg, updateCurrentBg]);

            const toggleBgLock = useCallback(() => {
                if (!currentBg) return;
                setBgLocked(v => !v);
            }, [currentBg]);

            // --- Import handlers ---
            const handleImportClick = useCallback(() => {
                try {
                    if (fileInputRef.current) fileInputRef.current.click();
                } catch (e) {}
            }, []);

            const ensurePdfWorker = useCallback(() => {
                try {
                    if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions && !window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
                        // Match the version above (cdnjs)
                        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.js';
                    }
                } catch (e) {}
            }, []);

            const keyFromFifths = (fifths, mode) => {
                const maj = { "-7":"Cb","-6":"Gb","-5":"Db","-4":"Ab","-3":"Eb","-2":"Bb","-1":"F","0":"C","1":"G","2":"D","3":"A","4":"E","5":"B","6":"F#","7":"C#" };
                const min = { "-7":"Abm","-6":"Ebm","-5":"Bbm","-4":"Fm","-3":"Cm","-2":"Gm","-1":"Dm","0":"Am","1":"Em","2":"Bm","3":"F#m","4":"C#m","5":"G#m","6":"D#m","7":"A#m" };
                const map = (mode === 'minor') ? min : maj;
                return map[String(fifths)] || (mode === 'minor' ? 'Am' : 'C');
            };

            const pitchToAbc = (step, alter, octave) => {
                if (!step) return '';
                const acc = (alter === 2) ? '^^' : (alter === 1) ? '^' : (alter === -1) ? '_' : (alter === -2) ? '__' : '';
                const st = String(step).toUpperCase();
                const oct = (typeof octave === 'number') ? octave : 4;
                let note = st;

                if (oct >= 5) {
                    note = st.toLowerCase();
                    note += "'".repeat(Math.max(0, oct - 5));
                } else if (oct === 4) {
                    note = st;
                } else {
                    note = st + ",".repeat(Math.max(0, 4 - oct));
                }
                return acc + note;
            };

            const gcd2 = (a, b) => {
                a = Math.abs(a|0); b = Math.abs(b|0);
                while (b) { const t = a % b; a = b; b = t; }
                return a || 1;
            };

            const parseMusicXMLToABC = (xmlText) => {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(xmlText, 'application/xml');
                    const root = doc.documentElement;
                    if (!root) throw new Error('Invalid XML');

                    const titleNode = doc.querySelector('work > work-title') || doc.querySelector('movement-title');
                    const composerNode = doc.querySelector('identification creator[type="composer"]');
                    const tTitle = titleNode ? (titleNode.textContent || '').trim() : 'Imported';
                    const tComposer = composerNode ? (composerNode.textContent || '').trim() : '';

                    const part = doc.querySelector('part');
                    if (!part) throw new Error('No <part> found');

                    const firstMeasure = part.querySelector('measure');
                    const divisionsNode = firstMeasure ? firstMeasure.querySelector('attributes > divisions') : null;
                    const divisions = divisionsNode ? parseInt(divisionsNode.textContent || '0', 10) : 0;

                    const timeNode = firstMeasure ? firstMeasure.querySelector('attributes > time') : null;
                    const beats = timeNode ? parseInt((timeNode.querySelector('beats')?.textContent || '4'), 10) : 4;
                    const beatType = timeNode ? parseInt((timeNode.querySelector('beat-type')?.textContent || '4'), 10) : 4;

                    const keyNode = firstMeasure ? firstMeasure.querySelector('attributes > key') : null;
                    const fifths = keyNode ? parseInt((keyNode.querySelector('fifths')?.textContent || '0'), 10) : 0;
                    const modeTxt = (keyNode?.querySelector('mode')?.textContent || '').trim().toLowerCase();
                    const mode = modeTxt === 'minor' ? 'minor' : 'major';
                    const keyStr = keyFromFifths(fifths, mode);

                    // Tempo (best-effort)
                    let bpm = 120;
                    const tempoAttr = doc.querySelector('direction sound[tempo]');
                    if (tempoAttr) {
                        const v = parseFloat(tempoAttr.getAttribute('tempo') || '');
                        if (Number.isFinite(v) && v > 10 && v < 400) bpm = Math.round(v);
                    }

                    // Gather durations to choose L:
                    const durVals = [];
                    part.querySelectorAll('note duration').forEach(n => {
                        const v = parseInt(n.textContent || '0', 10);
                        if (v > 0) durVals.push(v);
                    });
                    let base = (durVals.length ? durVals.reduce((g, v) => gcd2(g, v), durVals[0]) : (divisions ? Math.max(1, Math.floor(divisions/4)) : 1));
                    if (!base || base <= 0) base = 1;
                    const div = divisions || 1;
                    // L is fraction of whole note: baseQuarter = base/div, whole = baseQuarter/4 => denom = 4*div/base
                    let denom = Math.round((4 * div) / base);
                    const nice = [1,2,4,8,16,32,64];
                    denom = nice.reduce((best, n) => (Math.abs(n - denom) < Math.abs(best - denom) ? n : best), nice[3]);
                    if (denom < 1) denom = 8;

                    // Convert measures
                    const measures = Array.from(part.querySelectorAll('measure'));
                    const bodyParts = [];
                    for (const meas of measures) {
