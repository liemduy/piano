                let approxPos = before.length + insertStr.length;

                // --- AUTO BEAM (Pro): ghép beam theo nhóm phách của nhịp ---
                // Quy tắc:
                // - Các nốt móc (<= beat/2) trong cùng "beat-group" sẽ được viết dính liền (không space) để abcjs tự beam.
                // - Qua ranh giới beat-group sẽ chèn space để ngắt beam đúng phách.
                // - Không đụng tới barline đặc biệt |: :| [1 [2, tuplets... (an toàn)
                const parseFrac = (ss) => {
                    const m = (ss || '').trim().match(/^(\d+)\s*\/\s*(\d+)$/);
                    if (!m) return null;
                    const a = parseInt(m[1], 10);
                    const b = parseInt(m[2], 10);
                    if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return null;
                    return a / b;
                };
                const getHeader = (field, fallback) => {
                    const m = newText.match(new RegExp(`^${field}:\\s*(.*)$`, 'm'));
                    return m ? (m[1] || '').trim() : fallback;
                };
                const getMeterNums = () => {
                    const M = getHeader('M', '4/4');
                    const mm = M.match(/^(\d+)\s*\/\s*(\d+)$/);
                    if (!mm) return { num: 4, den: 4 };
                    return { num: parseInt(mm[1], 10), den: parseInt(mm[2], 10) };
                };
                const getLWhole = () => {
                    const L = getHeader('L', '1/4');
                    const f = parseFrac(L);
                    return f ?? (1 / 4);
                };
                const parseLenSuffix = (lenStr) => {
                    const t = (lenStr || '').trim();
                    if (!t) return 1;
                    if (t === '/') return 0.5;
                    if (t === '//') return 0.25;
                    if (/^\d+$/.test(t)) return parseInt(t, 10);
                    if (/^\/\d+$/.test(t)) return 1 / parseInt(t.slice(1), 10);
                    if (/^\d+\/\d+$/.test(t)) {
                        const [a, b] = t.split('/');
                        return parseInt(a, 10) / parseInt(b, 10);
                    }
                    if (/^\d+\/$/.test(t)) return parseInt(t, 10) / 2;
                    return null;
                };
                const tokenDurationWhole = (tok, LWhole) => {
                    const t0 = (tok || '').trim();
                    if (!t0) return 0;
                    // strip slur and trailing ties for counting
                    const t = t0.replace(/[()]/g, '').replace(/-+$/g, '');

                    // chord
                    let m = t.match(/^\[[^\]]+\]([0-9\/]+|\/\/|\/)?$/);
                    if (m) {
                        const mult = parseLenSuffix(m[1] || '');
                        return mult == null ? null : (LWhole * mult);
                    }
                    // rest
                    m = t.match(/^z([0-9\/]+|\/\/|\/)?$/);
                    if (m) {
                        const mult = parseLenSuffix(m[1] || '');
                        return mult == null ? null : (LWhole * mult);
                    }
                    // note
                    m = t.match(/^(?:\^{1,2}|_{1,2}|=)?[A-Ga-g][,']*([0-9\/]+|\/\/|\/)?$/);
                    if (m) {
                        const mult = parseLenSuffix(m[1] || '');
                        return mult == null ? null : (LWhole * mult);
                    }
                    return 0;
                };

                const applyBeatGroupedBeaming = (fullText, voiceId) => {
                    const { num, den } = getMeterNums();
                    const LWhole = getLWhole();

                    // beat length in whole notes
                    const isCompound = (den === 8 && num >= 6 && num % 3 === 0);
                    const beatLen = isCompound ? (3 / den) : (1 / den);
                    const beamThresh = Math.min(1/8, (beatLen / 2)) + 1e-9;
                    const eps = 1e-9;

                    const tokenRe = /(\[[^\]]+\](?:\d+\/\d+|\d+|\/\d+|\/|\/\/)?-?|z(?:\d+\/\d+|\d+|\/\d+|\/|\/\/)?-?|(?:\^{1,2}|_{1,2}|=)?[A-Ga-g][,']*(?:\d+\/\d+|\d+|\/\d+|\/|\/\/)?-?)/g;

                    const isRest = (tok) => (tok || '').replace(/[()]/g, '').startsWith('z');
                    const isBeamable = (tok) => {
                        if (!tok) return false;
                        if (isRest(tok)) return false;
                        const d = tokenDurationWhole(tok, LWhole);
                        if (d == null) return false;
                        return d > 0 && d <= beamThresh;
                    };

                    const beamMeasure = (mea) => {
                        const raw = (mea || '');
                        // an toàn: bỏ qua nếu có slur/tuplet/decoration phức tạp
                        if (raw.includes('(') || raw.includes(')') || raw.includes('!') || raw.includes('{') || raw.includes('>') || raw.includes('<')) return raw;

                        const toks = raw.match(tokenRe) || [];
                        const remainder = raw.replace(tokenRe, '').replace(/\s+/g, '');
                        if (remainder !== '') return raw;

                        // build beat groups
                        let beatPos = 0;
                        let group = [];
                        const groups = [];

                        const flush = () => {
                            if (group.length) groups.push(group);
                            group = [];
                        };

                        for (const tok of toks) {
                            const d = tokenDurationWhole(tok, LWhole);
                            if (d == null) return raw;

                            if (d <= 0) {
                                // punctuation-like token -> keep in current group
                                group.push(tok);
                                continue;
                            }

                            if (beatPos + d > beatLen + eps) {
                                // new beat group
                                flush();
                                beatPos = 0;
                            }

                            group.push(tok);
                            beatPos += d;

                            if (Math.abs(beatPos - beatLen) <= eps) {
                                flush();
                                beatPos = 0;
                            }
                        }
                        flush();

                        const joinGroup = (g) => {
                            if (!g.length) return '';
                            let out = g[0];
                            for (let i = 1; i < g.length; i++) {
                                const prev = g[i - 1];
                                const cur = g[i];
                                if (isBeamable(prev) && isBeamable(cur)) out += cur;
                                else out += ' ' + cur;
                            }
                            return out.trim();
                        };

                        return groups.map(joinGroup).filter(Boolean).join(' ').trim();
                    };

                    const lines = fullText.split('\n');
                    const outLines = lines.map(line => {
                        const ln = line || '';
                        if (!ln.trim()) return ln;
                        if (/^[A-Za-z]:/.test(ln)) return ln; // header

                        const prefix = `[V:${voiceId}]`;
                        if (!ln.trimStart().startsWith(prefix)) return ln;

                        // an toàn: bỏ qua nếu có repeat/ending
                        if (/\|:|:\||\[\d+/.test(ln)) return ln;

                        const m = ln.match(/^(\s*\[V:\d+\])\s*(.*)$/);
                        if (!m) return ln;
                        const voiceTag = m[1] + ' ';
                        const music = (m[2] || '');

                        const hasTrailingBar = /\|\s*$/.test(music);
                        const parts = music.split('|');

                        const rebuiltParts = parts.map(seg => beamMeasure(seg.trim()));
                        let rebuilt = rebuiltParts.filter((_, i) => i < rebuiltParts.length).join(' | ').trim();
                        // normalize
                        rebuilt = rebuilt.replace(/\s+\|/g, ' |').replace(/\|\s+/g, '| ');
                        if (hasTrailingBar && !rebuilt.endsWith('|')) rebuilt = rebuilt + ' |';
                        else if (!hasTrailingBar && rebuilt.endsWith('|')) rebuilt = rebuilt.replace(/\|\s*$/, '').trimEnd();

                        return (voiceTag + rebuilt).trimEnd();
                    });

                    return outLines.join('\n');
                };

                // Only run auto-beam if token is short enough to matter (móc đơn/kép)
                const LWhole = getLWhole();
                const { num, den } = getMeterNums();
                const isCompound = (den === 8 && num >= 6 && num % 3 === 0);
                const beatLen = isCompound ? (3 / den) : (1 / den);
                const beamThresh = Math.min(1/8, (beatLen / 2)) + 1e-9;

                const insertedDur = tokenDurationWhole(insertTok, LWhole);
                const shouldBeam = insertedDur != null && insertedDur > 0 && insertedDur <= beamThresh;

                if (shouldBeam) {
                    const beamedText = applyBeatGroupedBeaming(newText, targetVoiceId);

                    // best-effort keep cursor near inserted token
                    const searchFrom = Math.max(0, approxPos - 220);
                    const searchTo = Math.min(beamedText.length, approxPos + 220);
                    const window = beamedText.slice(searchFrom, searchTo);
                    const localIdx = window.lastIndexOf(insertTok);
                    const newPos = localIdx !== -1 ? (searchFrom + localIdx + insertTok.length) : Math.min(approxPos, beamedText.length);

                    newText = beamedText;
                    approxPos = newPos;
                }

                updateTextAndSync(newText, approxPos);
            };

            const updateHeaderField = (field, value) => {
                const lines = abcText.split('\n');
                let found = false;
                const newLines = lines.map(line => {
                    if (line.startsWith(`${field}:`)) {
                        found = true;
                        return `${field}: ${value}`;
                    }
                    return line;
                });
                if (!found) newLines.splice(1, 0, `${field}: ${value}`);
                applyTextChange(newLines.join('\n'), Math.min(cursorPosRef.current, newLines.join('\n').length), { focus: false });
            };



            // --- SYNC UI META TỪ ABC (để refresh vẫn giữ đúng thông tin ở panel) ---
            const getHeaderValue = (text, field) => {
                const m = String(text || '').match(new RegExp(`^${field}:\\s*(.+)$`, 'm'));
                return m ? String(m[1] || '').trim() : '';
            };

            const parseTempoFromQ = (qVal) => {
                const s = String(qVal || '').trim();
                if (!s) return '';
                const mEq = s.match(/=\s*(\d+)/);
                if (mEq) {
                    const n = parseInt(mEq[1], 10);
                    return Number.isFinite(n) ? String(n) : '';
                }
                const mNum = s.match(/(\d+)/);
                if (mNum) {
                    const n = parseInt(mNum[1], 10);
                    return Number.isFinite(n) ? String(n) : '';
                }
                return '';
            };

            const parseKeyLine = (kVal) => {
                const raw = String(kVal || '').trim();
                if (!raw) return null;

                // Example: "Am", "Bb", "F#", "C exp ^f ^c"
                const parts = raw.split(/\s+/).filter(Boolean);
                const first = parts[0] || '';
                const isMinor = /m$/.test(first) && first.length > 1;
                const tonic = isMinor ? first.slice(0, -1) : first;

                const out = {
                    tonic: tonic,
                    mode: isMinor ? 'minor' : 'major',
                    sigInput: KEY_SIG_HINT,
                    sigDirty: false,
                };

                const expIdx = parts.findIndex(p => String(p || '').toLowerCase() === 'exp');
                if (expIdx !== -1) {
                    const tokens = parts.slice(expIdx + 1);
                    const accs = [];
                    for (const tok of tokens) {
                        const mm = String(tok || '').match(/^(\^+|_+)([a-g])$/i);
                        if (!mm) continue;
                        const sym = mm[1][0]; // '^' or '_'
                        const letter = mm[2].toUpperCase();
                        accs.push(sym === '^' ? `${letter}#` : `${letter}b`);
                    }
                    if (accs.length) {
                        const seen = new Set();
                        const uniq = accs.filter(x => (seen.has(x) ? false : (seen.add(x), true)));
                        out.sigInput = uniq.join(', ');
                        out.sigDirty = true;
                    }
                }

                return out;
            };

            const syncMetaFromAbcText = (text) => {
                const t = getHeaderValue(text, 'T');
                const c = getHeaderValue(text, 'C');
                const m = getHeaderValue(text, 'M');
                const q = getHeaderValue(text, 'Q');
                const k = getHeaderValue(text, 'K');

                if (t) setTitle(t);
                if (c) setComposer(c);
                if (m) setMeter(m);

                const bpm = parseTempoFromQ(q);
                if (bpm) setTempo(bpm);

                const keyParsed = parseKeyLine(k);
                if (keyParsed && keyParsed.tonic) {
                    setKeyTonic(keyParsed.tonic);
                    setKeyMode(keyParsed.mode);

                    // Đừng overwrite keySigInput khi user đang gõ (dirty)
                    if (keyParsed.sigDirty) {
                        setKeySigInput(keyParsed.sigInput);
                        setKeySigDirty(true);
                    } else if (!keySigDirty) {
                        setKeySigInput(KEY_SIG_HINT);
                        setKeySigDirty(false);
                    }
                }
            };

            // Whenever ABC text changes (autosave load / paste / optimize...), keep info panel synced
            useEffect(() => {
                try { syncMetaFromAbcText(abcText); } catch (e) {}
            }, [abcText]);

            const applyKeySigFromTrebleInput = (raw) => {
                // raw: "F#, C#" or "Bb,Eb" ...
                const cleaned = (raw || '')
                    .replace(/♯/g, '#')
                    .replace(/♭/g, 'b')
                    .replace(/;/g, ',')
                    .trim();

                const parts = cleaned.split(',').map(p => p.trim()).filter(Boolean);
                const byLetter = {};
                for (const p of parts) {
                    const m = p.match(/([A-Ga-g])\s*([#b])?/);
                    if (!m) continue;
                    const letter = m[1].toUpperCase();
                    const acc = m[2] || (p.includes('#') ? '#' : (p.includes('b') ? 'b' : null));
                    if (acc !== '#' && acc !== 'b') continue;
                    if (!byLetter[letter]) byLetter[letter] = acc; // dedupe
                }

                const letters = Object.keys(byLetter);
                if (letters.length === 0) return;

                const accs = letters.map(l => byLetter[l]);
                const kind = accs.every(a => a === '#') ? '#' : (accs.every(a => a === 'b') ? 'b' : 'mixed');

                // If it's a standard signature (prefix of sharp/flat order) => suy ra luôn giọng (major/minor theo dropdown)
                if (kind === '#' || kind === 'b') {
                    const order = kind === '#' ? SHARP_ORDER : FLAT_ORDER;
                    const expected = order.slice(0, letters.length);
                    const setEq = (a, b) => a.length === b.length && a.every(x => b.includes(x));
                    if (setEq(expected, letters)) {
                        const table = (keyMode === 'minor')
                            ? (kind === '#' ? MINOR_BY_SHARPS : MINOR_BY_FLATS)
                            : (kind === '#' ? MAJOR_BY_SHARPS : MAJOR_BY_FLATS);

                        const tonic = table[letters.length];
                        if (tonic) {
                            setKeyTonic(tonic);
                            updateHeaderField('K', buildKeyString(tonic, keyMode));
                            return;
                        }
                    }

                    // Fallback: explicit signature bằng exp (không cần biết giọng)
                    const ordered = order.filter(n => byLetter[n] === kind);
                    const expTokens = ordered.map(n => (kind === '#' ? `^${n.toLowerCase()}` : `_${n.toLowerCase()}`));
                    updateHeaderField('K', `C exp ${expTokens.join(' ')}`);
                    return;
                }

                // Mixed #/b => fallback exp (giữ đúng bộ dấu)
                const expTokens = letters.map(n => (byLetter[n] === '#' ? `^${n.toLowerCase()}` : `_${n.toLowerCase()}`));
                updateHeaderField('K', `C exp ${expTokens.join(' ')}`);
            };


            // --- LAZY MODE: parse tiếng Việt -> ABC ---
            const stripDiacritics = (s) => (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            const normKey = (s) => stripDiacritics(s).toLowerCase().trim();

            const VI_NOTE_MAP = {
                do: 'C', re: 'D', mi: 'E', fa: 'F', sol: 'G', la: 'A', si: 'B'
            };

            const durToLen = (dur, baseLFrac) => {
                // baseLFrac: {num, den} of L in whole-notes (e.g., 1/4 => {1,4})
                const d0 = normKey(dur);

                // duration names (whole-note fractions)
                const baseMap = {
                    tron: { num: 1, den: 1 },
                    trang: { num: 1, den: 2 },
                    den: { num: 1, den: 4 },
                    moc: { num: 1, den: 8 },
                    'moc-kep': { num: 1, den: 16 },
                    'moc-ba': { num: 1, den: 32 }
                };

                const isDoi = d0.endsWith('-doi');
                const key = isDoi ? d0.slice(0, -4) : d0;

                const frac = baseMap[key];
                if (!frac) {
                    throw new Error(`Duration không hợp lệ: "${dur}". Dùng: den | trang | tron | moc | moc-kep | moc-ba (có thể thêm -doi)`);
                }

                // apply dotted (x 3/2)
                let num = frac.num;
                let den = frac.den;
                if (isDoi) {
                    num = num * 3;
                    den = den * 2;
                }

                // multiplier = duration / L
                const mNum = num * baseLFrac.den;
                const mDen = den * baseLFrac.num;

                // reduce
                const g = (a, b) => { a=Math.abs(a); b=Math.abs(b); while (b){const t=a%b; a=b; b=t;} return a||1; };
                const gg = g(mNum, mDen);
                const rNum = mNum / gg;
                const rDen = mDen / gg;

                if (rNum === rDen) return '';
                if (rDen === 1) return String(rNum);
                if (rNum === 1) return `/${rDen}`;
                return `${rNum}/${rDen}`;
            };

            const toAbcPitch = (abcLetter, octaveNum) => {
                const o = parseInt(octaveNum, 10);
                if (!Number.isFinite(o)) throw new Error(`Octave không hợp lệ: "${octaveNum}"`);

                const baseUpper = abcLetter.toUpperCase();
                const baseLower = abcLetter.toLowerCase();

                if (o >= 5) {
                    const apost = "'".repeat(o - 5);
                    return baseLower + apost;
                }
                if (o <= 4) {
                    const commas = ",".repeat(4 - o);
                    return baseUpper + commas;
                }
                return baseUpper;
            };

            const parseNoteToken = (token, baseLFrac) => {
                // Note: Do4-den, Sol5-trang...
                const m = token.trim().match(/^([A-Za-z]+)(\d+)\s*-\s*([A-Za-z]+)$/);
                if (!m) throw new Error(`Token nốt không hợp lệ: "${token}" (đúng format: Do4-den)`);
                const noteName = normKey(m[1]);
                const octave = m[2];
                const dur = m[3];

                const letter = VI_NOTE_MAP[noteName];
                if (!letter) throw new Error(`Tên nốt không hợp lệ: "${m[1]}". Dùng: Do/Re/Mi/Fa/Sol/La/Si`);
                const pitch = toAbcPitch(letter, octave);
                const len = durToLen(dur, baseLFrac);
                return pitch + len;
            };

            const parseRestToken = (token, baseLFrac) => {
                // 7-den, 7-trang...
                const m = token.trim().match(/^7\s*-\s*([A-Za-z]+)$/);
                if (!m) throw new Error(`Token nghỉ không hợp lệ: "${token}" (đúng format: 7-den)`);
                const len = durToLen(m[1], baseLFrac);
                return 'z' + len;
            };

            const parseChordToken = (token, baseLFrac) => {
                // [Do5 Mi5]-trang
                const m = token.trim().match(/^\[(.+?)\]\s*-\s*([A-Za-z]+)$/);
                if (!m) throw new Error(`Token chord không hợp lệ: "${token}" (đúng format: [Do5 Mi5]-trang)`);
                const inside = m[1].trim();
                if (!inside) throw new Error(`Chord rỗng: "${token}"`);
                const dur = m[2];
                const len = durToLen(dur, baseLFrac);

                // inside: "Do5 Mi5 Sol5" (space-separated)
                const parts = inside.split(/\s+/).filter(Boolean);
                const pitches = parts.map(p => {
                    const mm = p.match(/^([A-Za-z]+)(\d+)$/);
                    if (!mm) throw new Error(`Nốt trong chord sai: "${p}" (đúng format: Do5)`);
                    const noteName = normKey(mm[1]);
                    const octave = mm[2];
                    const letter = VI_NOTE_MAP[noteName];
                    if (!letter) throw new Error(`Tên nốt trong chord không hợp lệ: "${mm[1]}"`);
                    return toAbcPitch(letter, octave);
                });

                return `[${pitches.join('')}]${len}`;
            };

            const parseVoiceLine = (raw, baseLFrac) => {
                // raw: tokens separated by ',' ; barlines by ';'
                const src = (raw || '').trim();
                if (!src) return '';

                const measures = src.split(';').map(x => x.trim()).filter(x => x.length > 0);
                if (measures.length === 0) return '';

                const outMeasures = measures.map(mea => {
                    const tokens = mea.split(',').map(x => x.trim()).filter(Boolean);
                    const converted = tokens.map(tok => {
                        if (tok.startsWith('[')) return parseChordToken(tok, baseLFrac);
                        if (tok.trim().startsWith('7')) return parseRestToken(tok, baseLFrac);
                        return parseNoteToken(tok, baseLFrac);
                    });
                    return converted.join(' ');
                });

                // luôn kết thúc bằng barline để nhìn rõ
                return outMeasures.join(' | ') + ' |';
            };

            const parseLazyToAbc = (lazyText) => {
                const lines = (lazyText || '').split('\n');

                const defaults = {
                    title: 'Bài Hát Mới',
                    composer: 'Tác giả',
                    meter: '4/4',
                    tempo: '120',
                    key: 'C',
                    v1: '',
                    v2: ''
                };

                const result = { ...defaults };

                for (const lineRaw of lines) {
                    const line = lineRaw.trim();
                    if (!line) continue;
                    const idx = line.indexOf(':');
                    if (idx === -1) continue;

                    const keyRaw = line.slice(0, idx).trim();
                    const valRaw = line.slice(idx + 1).trim();
                    const k = normKey(keyRaw);

                    if (k === 'ten bai' || k === 'tenbai') result.title = valRaw || defaults.title;
                    else if (k === 'tac gia' || k === 'tacgia') result.composer = valRaw || defaults.composer;
                    else if (k === 'nhip') result.meter = valRaw || defaults.meter;
                    else if (k === 'tempo' || k === 'bpm') result.tempo = valRaw || defaults.tempo;
                    else if (k === 'giong' || k === 'key') result.key = valRaw || defaults.key;
                    else if (k === 'tay phai' || k === 'tayphai') result.v1 = valRaw;
                    else if (k === 'tay trai' || k === 'taytrai') result.v2 = valRaw;
                }

                // build ABC
                const bpm = parseInt(result.tempo, 10);
                if (!Number.isFinite(bpm) || bpm <= 0) throw new Error(`Tempo không hợp lệ: "${result.tempo}"`);

                // auto chọn L theo nhịp: nếu */8 (6/8, 9/8, 12/8) thì L=1/8, còn lại L=1/4
                const meterMatch = String(result.meter || '').match(/(\d+)\s*\/\s*(\d+)/);
                const meterDen = meterMatch ? parseInt(meterMatch[2], 10) : 4;
                const baseLStr = (meterDen === 8) ? '1/8' : '1/4';
                const baseLFrac = (meterDen === 8) ? { num: 1, den: 8 } : { num: 1, den: 4 };

                const v1Body = parseVoiceLine(result.v1, baseLFrac);
                const v2Body = parseVoiceLine(result.v2, baseLFrac);

                let abc = '';
                abc += `X: 1\n`;
                abc += `T: ${result.title}\n`;
                abc += `C: ${result.composer}\n`;
                abc += `M: ${result.meter}\n`;
                abc += `L: ${baseLStr}\n`;
                abc += `Q: 1/4=${bpm}\n`;
                abc += `K: ${result.key}\n`;
                abc += `V:1 clef=treble\n`;

                if (v2Body) {
                    abc += `V:2 clef=bass\n`;
                }

                abc += `[V:1] ${v1Body || ''}\n`;
                if (v2Body) {
                    abc += `[V:2] ${v2Body}\n`;
                }

                return { abc, meta: result };
            };


            const copyLazyExample = async () => {
                try {
                    await navigator.clipboard.writeText(LAZY_PLACEHOLDER);
                } catch (e) {
                    const ta = document.createElement('textarea');
                    ta.value = LAZY_PLACEHOLDER;
                    document.body.appendChild(ta);
                    ta.select();
                    try { document.execCommand('copy'); } catch (_) {}
                    document.body.removeChild(ta);
                }
                setLazyExampleCopied(true);
                setTimeout(() => setLazyExampleCopied(false), 1200);
            };

            const handleLazySync = () => {
                try {
                    setLazyError('');
                    const raw = (lazyInput || '').trim();
                    if (!raw) {
                        setLazyError('Chưa có nội dung. Hãy paste vào ô hoặc dùng ví dụ trong placeholder.');
                        return;
                    }

                    const { abc, meta } = parseLazyToAbc(raw);

                    // sync UI states cơ bản
                    setTitle(meta.title || 'Bài Hát Mới');
                    setComposer(meta.composer || 'Tác giả');
                    setMeter(meta.meter || '4/4');
                    setTempo(String(parseInt(meta.tempo, 10) || 120));

                    // sync key tonic/mode đơn giản (vd: Am)
                    const kTrim = (meta.key || 'C').trim();
                    if (/m$/.test(kTrim) && kTrim.length > 1) {
                        setKeyMode('minor');
                        setKeyTonic(kTrim.slice(0, -1));
                    } else {
                        setKeyMode('major');
                        setKeyTonic(kTrim);
                    }
                    setKeySigInput(KEY_SIG_HINT);
                    setKeySigDirty(false);

                    applyTextChange(abc, abc.length, { focus: false, skipHistory: false });
                    syncVoicesFromText(abc);

                    setShowLazyModal(false);
                    setShowLazyInstruction(false);
                    // giữ lại text để user chỉnh tiếp nếu muốn: không xoá lazyInput
                } catch (e) {
                    setLazyError(e?.message ? String(e.message) : 'Parse lỗi (không rõ nguyên nhân)');
                }
            };

            // --- TÍNH TOÁN NỐT NHẠC ---
            const getNoteString = (baseNote, octaveObj, accidental = '') => {
                let note = baseNote;
                if (octaveObj.lowerCase) note = note.toLowerCase();
                
                let lengthStr = '';
                if (duration === '1') lengthStr = isDotted ? '6' : '4'; 
                else if (duration === '2') lengthStr = isDotted ? '3' : '2'; 
                else if (duration === '4') lengthStr = isDotted ? '3/2' : ''; 
                else if (duration === '8') lengthStr = isDotted ? '3/4' : '/2'; 
                else if (duration === '16') lengthStr = isDotted ? '3/8' : '/4'; 
                else if (duration === '32') lengthStr = isDotted ? '3/16' : '/8'; 

                return `${accidental}${note}${octaveObj.suffix}${lengthStr}`;
            };

            // --- SỰ KIỆN CLICK & PRESS NỐT ---
            const handleNoteDoubleClick = (baseNote, octaveObj) => {
                const noteStr = getNoteString(baseNote, octaveObj);
                insertSmartText(noteStr);
            };

            const handleMouseDown = (e, baseNote, octaveObj) => {
                e.preventDefault();
                const rect = e.currentTarget.getBoundingClientRect();
                pressTimer.current = setTimeout(() => {
                    setLongPressTarget({
                        baseNote,
                        octaveObj,
                        x: rect.left + rect.width / 2,
                        y: rect.top - 40
                    });
                }, 400); 
            };

            const handleMouseUpOrLeave = () => {
                if (pressTimer.current) {
                    clearTimeout(pressTimer.current);
                    pressTimer.current = null;
                }
            };

            const selectAccidental = (accidental) => {
                if (longPressTarget) {
                    const noteStr = getNoteString(longPressTarget.baseNote, longPressTarget.octaveObj, accidental);
                    insertSmartText(noteStr);
                    setLongPressTarget(null);
                }
            };


            // --- NHÓM CỘT NỐT (CHORD) ---
            // Cách dùng: bôi đen các nốt trong khung ABC (ví dụ: "C E G" hoặc "C2 E2 G2") rồi bấm nút "Nhóm cột nốt"
            const groupSelectedToChord = () => {
                const ta = textAreaRef.current;
                if (!ta) return;

                const start = ta.selectionStart ?? cursorPos;
                const end = ta.selectionEnd ?? cursorPos;

                if (start === end) {
                    alert('Hãy bôi đen ít nhất 2 nốt trong khung ABC rồi bấm "Nhóm cột nốt".\nVí dụ: C E G  hoặc  C2 E2 G2');
                    return;
                }

                const raw = abcText.slice(start, end);
                const selected = raw.trim();
                const tokens = selected.split(/\s+/).filter(Boolean);

                if (tokens.length < 2) {
                    alert('Hãy chọn ít nhất 2 nốt để nhóm thành cột nốt.');
                    return;
                }

                // Không cho nhóm nếu đã có chord hoặc có ký tự lạ
                if (tokens.some(t => t.includes('[') || t.includes(']') || t.includes('|'))) {
                    alert('Vùng chọn chỉ nên gồm các nốt (không gồm | hay [ ]). Ví dụ: C E G hoặc C2 E2 G2');
                    return;
                }

                const parseNote = (tok) => {
                    const m = tok.match(/^([\^_=]*[A-Ga-g][,']*)(\d+\/\d+|\d+|\/\d+|\/)?$/);
                    if (!m) return null;
                    return { head: m[1], len: m[2] || '' };
                };

                const parsed = tokens.map(parseNote);
                if (parsed.some(p => !p)) {
                    alert('Vùng chọn phải chỉ gồm các nốt hợp lệ. Ví dụ: C E G hoặc ^F A c\'');
                    return;
                }

                const len = parsed[0].len;
                if (!parsed.every(p => p.len === len)) {
                    alert('Các nốt đang chọn phải cùng trường độ (ví dụ: C2 E2 G2).');
                    return;
                }

                const chord = `[${parsed.map(p => p.head).join('')}]${len}`;

                const before = abcText.slice(0, start);
                const after = abcText.slice(end);

                let insert = chord;

                // Thêm khoảng trắng cho "đẹp" khi dán vào giữa văn bản
                if (before && !/[ \t\n|]$/.test(before)) insert = ' ' + insert;
                if (!after || !/^[ \t\n|]/.test(after)) insert = insert + ' ';
                else insert = insert + ' ';

                const newText = before + insert + after;
                const newPos = (before + insert).length;

                updateTextAndSync(newText, newPos);
            };

            // --- VOICING TABS ---
            const addVoice = (clef) => {
                if (voices.length >= 2) return;
                const newVoiceId = voices.length + 1;
                setVoices([...voices, { id: newVoiceId, clef }]);
                setShowAddVoice(false);
                setActiveVoice(newVoiceId);

                const voiceDecl = `V:${newVoiceId} clef=${clef}`;
                const lines = abcText.split('\n');
                let insertIdx = lines.findIndex(l => l.startsWith('V:'));
                if (insertIdx === -1) insertIdx = lines.findIndex(l => l.startsWith('K:'));
                
                if (insertIdx !== -1) {
                    let lastVIdx = insertIdx;
                    for (let i = insertIdx; i < lines.length; i++) {
                        if (lines[i].startsWith('V:')) lastVIdx = i;
                        else if (!lines[i].startsWith('V:') && i > insertIdx) break;
                    }
                    lines.splice(lastVIdx + 1, 0, voiceDecl);
                } else {
                    lines.unshift(voiceDecl);
                }
                
                let newText = lines.join('\n');
                newText = newText.trimEnd() + `\n[V:${newVoiceId}] `;
                updateTextAndSync(newText, newText.length);
            };

            const changeVoiceTab = (id) => {
                setActiveVoice(id);
                const voiceMarker = `[V:${id}]`;
                const matchPos = abcText.indexOf(voiceMarker);
                if (matchPos !== -1) {
                    const searchStart = matchPos + voiceMarker.length;
                    const restText = abcText.substring(searchStart);
                    const nextVoiceMatch = restText.match(/\[V:\d+\]/);
                    let endPos = nextVoiceMatch 
                        ? searchStart + nextVoiceMatch.index 
                        : abcText.length;
                    
                    while (endPos > searchStart && (abcText[endPos - 1] === ' ' || abcText[endPos - 1] === '\n')) {
                        endPos--;
                    }
                    
                    updateTextAndSync(abcText, endPos);
                }
            };

            // --- OPTIMIZE (Format / Clean / Validate / Auto-barline) ---
            const parseHeaderField = (field, fallback) => {
                const m = abcText.match(new RegExp(`^${field}:\\s*(.*)$`, 'm'));
                return m ? (m[1] || '').trim() : fallback;
            };

            const parseFrac = (s) => {
                const t = (s || '').trim();
                if (!t) return null;
                const m = t.match(/^(\d+)\s*\/\s*(\d+)$/);
                if (!m) return null;
                const a = parseInt(m[1], 10);
                const b = parseInt(m[2], 10);
                if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return null;
                return a / b;
            };

            const parseLenSuffix = (lenStr) => {
                const t = (lenStr || '').trim();
                if (!t) return 1;
                if (t === '/') return 0.5;
                if (t === '//') return 0.25;
                if (/^\d+$/.test(t)) return parseInt(t, 10);
                if (/^\/\d+$/.test(t)) return 1 / parseInt(t.slice(1), 10);
                if (/^\d+\/\d+$/.test(t)) {
                    const [a, b] = t.split('/');
                    return parseInt(a, 10) / parseInt(b, 10);
                }
                if (/^\d+\/$/.test(t)) return parseInt(t, 10) / 2;
                return null;
            };

            const tokenDurationWhole = (tok, LWhole) => {
                const t0 = (tok || '').trim();
                if (!t0) return 0;

                // Strip slur/tie markers from edges for counting
                const t = t0.replace(/[()]/g, '').replace(/-+$/g, '');

                // chord
                let m = t.match(/^\[[^\]]+\]([0-9\/]+|\/\/|\/)?$/);
                if (m) {
                    const mult = parseLenSuffix(m[1] || '');
                    return mult == null ? null : (LWhole * mult);
                }
                // rest
                m = t.match(/^z([0-9\/]+|\/\/|\/)?$/);
                if (m) {
                    const mult = parseLenSuffix(m[1] || '');
                    return mult == null ? null : (LWhole * mult);
                }
                // note
                m = t.match(/^(?:\^{1,2}|_{1,2}|=)?[A-Ga-g][,']*([0-9\/]+|\/\/|\/)?$/);
                if (m) {
                    const mult = parseLenSuffix(m[1] || '');
                    return mult == null ? null : (LWhole * mult);
                }

                // other tokens ignored (e.g. decorations)
                return 0;
            };

            const getVoiceBlock = (voiceId) => {
                const marker = `[V:${voiceId}]`;
                const start = abcText.indexOf(marker);
                if (start === -1) return null;
                const afterStart = start + marker.length;
                const rest = abcText.slice(afterStart);
                const next = rest.match(/\n\[V:\d+\]/);
                const end = next ? afterStart + next.index : abcText.length;
                return { start, afterStart, end };
            };

            const getVoiceMusic = (voiceId) => {
                const blk = getVoiceBlock(voiceId);
                if (!blk) return null;
                const content = abcText.slice(blk.afterStart, blk.end);
                return content.replace(/\n/g, ' ').trim();
            };

            const formatVoiceBars = (voiceId, music, barsPerLine = 4) => {
                // normalize barlines for formatting only
                const normalized = (music || '')
                    .replace(/\|:/g, '|')
                    .replace(/:\|/g, '|')
                    .replace(/\|\|/g, '|')
                    .replace(/\|\]/g, '|');

                const measures = normalized.split('|').map(x => x.trim()).filter(Boolean);
                const tag = `[V:${voiceId}] `;
                const lines = [];
                for (let i = 0; i < measures.length; i += barsPerLine) {
                    const chunk = measures.slice(i, i + barsPerLine).join(' | ');
                    lines.push(tag + chunk + ' |');
                }
                return lines.join('\n');
            };

            const handleOptimizeFormat = () => {
                const lines = abcText.split('\n');
                const optimizedLines = [];

                lines.forEach(line => {
                    if (/^[A-Za-z]:/.test(line) || line.trim() === '') {
                        optimizedLines.push(line);
                        return;
                    }

                    const measures = line.split('|').map(m => m.trim()).filter(m => m !== '');
                    let voiceTag = '';
                    if (measures.length > 0 && measures[0].startsWith('[V:')) {
                        const match = measures[0].match(/(\[V:\d+\])(.*)/);
                        if (match) {
                            voiceTag = match[1] + ' ';
                            measures[0] = match[2].trim();
                        }
                    }

                    let currentLine = voiceTag;
                    for (let i = 0; i < measures.length; i++) {
                        currentLine += measures[i] + ' | ';
                        if ((i + 1) % 4 === 0 && i !== measures.length - 1) {
                            optimizedLines.push(currentLine.trim());
                            currentLine = voiceTag; // giữ tag cho dòng tiếp
                        }
                    }
                    if (currentLine.trim() !== '') {
                        optimizedLines.push(currentLine.trim());
                    }
                });

                applyTextChange(
                    optimizedLines.join('\n'),
                    Math.min(cursorPosRef.current, optimizedLines.join('\n').length),
                    { focus: false }
                );
            };

            const handleOptimizeCleanSpacing = () => {
                const lines = abcText.split('\n');
                const out = lines.map(line => {
                    if (/^[A-Za-z]:/.test(line) || line.trim() === '') return line.trimEnd();

                    // keep special barlines by temporarily protecting them
                    let t = line;
                    t = t.replace(/\|:/g, '§STARTREP§').replace(/:\|/g, '§ENDREP§').replace(/\|\]/g, '§END§');
                    t = t.replace(/\s+/g, ' ').trim();
                    t = t.replace(/\s*\|\s*/g, ' | ');
                    t = t.replace(/§STARTREP§/g, '|:').replace(/§ENDREP§/g, ':|').replace(/§END§/g, '|]');
                    return t;
                });

                applyTextChange(out.join('\n'), Math.min(cursorPosRef.current, out.join('\n').length), { focus: false });
            };

            const handleOptimizeBeamNotes = () => {
                try {
                    const L = parseHeaderField('L', '1/4');
                    const lFrac = parseFrac(L);
                    if (lFrac == null) throw new Error(`Không đọc được L: "${L}"`);
                    const LWhole = lFrac;
                    const BEAM_THRESH = 1/8; // quaver (móc đơn) hoặc nhỏ hơn

                    const isBeamable = (tok) => {
                        const t = (tok || '').trim();
                        if (!t) return false;
                        // đừng nối qua rest
                        if (t.replace(/[()]/g, '').startsWith('z')) return false;
                        const d = tokenDurationWhole(t, LWhole);
                        if (d == null) return false;
                        return d > 0 && d <= BEAM_THRESH + 1e-9;
                    };

                    const lines = abcText.split('\n');
                    const out = [];

                    for (const line of lines) {
                        const ln = line || '';
                        if (/^[A-Za-z]:/.test(ln) || ln.trim() === '') {
                            out.push(ln);
                            continue;
                        }

                        // bỏ qua nếu có repeat/ending đặc biệt (đỡ phá)
                        if (/\|:|:\||\[\d+/.test(ln)) {
                            out.push(ln);
                            continue;
                        }

                        let voiceTag = '';
                        let music = ln;

                        const vm = music.match(/^(\[V:\d+\])\s*(.*)$/);
                        if (vm) {
                            voiceTag = vm[1] + ' ';
                            music = vm[2] || '';
                        }

                        const hasTrailingBar = /\|\s*$/.test(music);
                        const parts = music.split('|');

                        const rebuiltParts = parts.map(seg => {
                            const tokens = seg.trim().split(/\s+/).filter(Boolean);
                            if (tokens.length <= 1) return tokens.join(' ');

                            let acc = tokens[0];
                            for (let i = 1; i < tokens.length; i++) {
                                const prev = tokens[i - 1];
                                const cur = tokens[i];
                                if (isBeamable(prev) && isBeamable(cur)) acc += cur;
                                else acc += ' ' + cur;
                            }
                            return acc;
                        });

                        let rebuilt = rebuiltParts.map(x => x.trim()).filter((_, i) => i < rebuiltParts.length - 1 ? true : true).join(' | ');
                        if (hasTrailingBar && !rebuilt.trim().endsWith('|')) rebuilt = rebuilt.trim() + ' |';

                        // normalize bar spacing
                        rebuilt = rebuilt.replace(/\s+\|/g, ' |').replace(/\|\s+/g, '| ');

                        out.push((voiceTag + rebuilt).trim());
                    }

                    applyTextChange(out.join('\n'), cursorPos, { focus: false, skipHistory: false });
                } catch (e) {
                    alert(e?.message ? String(e.message) : 'Không thể gộp móc (beaming).');
                }
            };


            const handleOptimizeValidateBars = () => {
                try {
                    const M = parseHeaderField('M', '4/4');
                    const L = parseHeaderField('L', '1/4');
                    const mFrac = parseFrac(M);
                    const lFrac = parseFrac(L);

                    if (mFrac == null) throw new Error(`Không đọc được nhịp M: "${M}"`);
                    if (lFrac == null) throw new Error(`Không đọc được L: "${L}"`);

                    const barLen = mFrac;      // whole-note fraction
                    const LWhole = lFrac;

                    const reportForVoice = (vid) => {
                        const music = getVoiceMusic(vid);
                        if (!music) return null;

                        const normalized = music.replace(/\|:/g, '|').replace(/:\|/g, '|').replace(/\|\|/g, '|').replace(/\|\]/g, '|');
                        const bars = normalized.split('|').map(x => x.trim()).filter(Boolean);
                        const issues = [];

                        bars.forEach((bar, idx) => {
                            const tokens = bar.split(/\s+/).filter(Boolean);
                            let sum = 0;
                            for (const tok of tokens) {
                                const d = tokenDurationWhole(tok, LWhole);
                                if (d == null) throw new Error(`Không parse được trường độ token: "${tok}" (voice ${vid}, bar ${idx + 1})`);
                                sum += d;
                            }
                            const diff = sum - barLen;
                            if (Math.abs(diff) > 1e-6) issues.push({ bar: idx + 1, diff });
                        });

                        return issues;
                    };

                    const v1Issues = reportForVoice(1);
                    const v2Issues = voices.some(v => v.id === 2) ? reportForVoice(2) : null;

                    const fmt = (diff) => {
                        const sign = diff > 0 ? '+' : '';
                        // show as fraction of L (approx)
                        const inL = diff / LWhole;
                        return `${sign}${inL.toFixed(3)}×L`;
                    };

                    let msg = `Kiểm tra nhịp (M=${M}, L=${L})\n\n`;

                    if (!v1Issues || v1Issues.length === 0) msg += `Voice 1: OK\n`;
                    else msg += `Voice 1 lỗi: ` + v1Issues.map(x => `bar ${x.bar} (${fmt(x.diff)})`).join(', ') + `\n`;

                    if (v2Issues != null) {
                        if (v2Issues.length === 0) msg += `Voice 2: OK\n`;
                        else msg += `Voice 2 lỗi: ` + v2Issues.map(x => `bar ${x.bar} (${fmt(x.diff)})`).join(', ') + `\n`;
                    }

                    alert(msg);
                } catch (e) {
                    alert(e?.message ? String(e.message) : 'Validate nhịp bị lỗi');
                }
            };

            const handleOptimizeAutoBarline = () => {
try {
                    const M = parseHeaderField('M', '4/4');
                    const L = parseHeaderField('L', '1/4');
                    const mFrac = parseFrac(M);
                    const lFrac = parseFrac(L);
                    if (mFrac == null) throw new Error(`Không đọc được M: "${M}"`);
                    if (lFrac == null) throw new Error(`Không đọc được L: "${L}"`);

                    const barLen = mFrac;
                    const LWhole = lFrac;

                    const abortIfSpecial = (music) => {
                        if (/\|:|:\||\[\d+/.test(music)) {
                            throw new Error('Auto Barline chưa hỗ trợ repeat/ending (|: :|, [1 [2). Hãy xoá chúng trước.');
                        }
                        if (/\(\d/.test(music)) {
                            throw new Error('Auto Barline chưa hỗ trợ tuplet (ví dụ: (3abc).');
                        }
                    };

                    const rebuildMusic = (music) => {
                        const raw = (music || '').replace(/\|/g, ' ').replace(/\s+/g, ' ').trim();
                        abortIfSpecial(music);

                        const tokens = raw.split(' ').filter(Boolean);
                        let sum = 0;
                        const out = [];
                        for (const tok of tokens) {
                            const d = tokenDurationWhole(tok, LWhole);
                            if (d == null) throw new Error(`Không parse được token: "${tok}"`);
                            if (d === 0) { out.push(tok); continue; }

                            if (sum + d > barLen + 1e-6) {
                                throw new Error(`Bị dư phách khi chia nhịp tại token "${tok}". (Gợi ý: kiểm tra trường độ hoặc tie)`);
                            }

                            out.push(tok);
                            sum += d;

                            if (Math.abs(sum - barLen) <= 1e-6) {
                                out.push('|');
                                sum = 0;
                            }
                        }
                        if (out.length && out[out.length - 1] !== '|') out.push('|');
                        return out.join(' ').replace(/\s+\|/g, ' |').replace(/\|\s+/g, '| ');
                    };

                    let newText = abcText;

                    // rebuild V1
                    const v1 = getVoiceMusic(1);
                    if (v1 != null) {
                        const rebuilt = rebuildMusic(v1);
                        const blk = getVoiceBlock(1);
                        const formatted = formatVoiceBars(1, rebuilt, 4);
                        newText = newText.slice(0, blk.start) + formatted + newText.slice(blk.end);
                    }

                    // rebuild V2 if present
                    if (voices.some(v => v.id === 2)) {
                        const v2 = getVoiceMusic(2);
                        if (v2 != null) {
                            const rebuilt2 = rebuildMusic(v2);
                            const blk2 = getVoiceBlock(2);
                            const formatted2 = formatVoiceBars(2, rebuilt2, 4);
                            newText = newText.slice(0, blk2.start) + formatted2 + newText.slice(blk2.end);
                        }
                    }

                    setAutoBarlineBefore(abcText);
                    setAutoBarlineAfter(newText);
                    setShowAutoBarlinePreview(true);
                } catch (e) {
                    alert(e?.message ? String(e.message) : 'Auto Barline bị lỗi');
                }
            };

            const applyAutoBarlinePreview = () => {
                const next = autoBarlineAfter || '';
                applyTextChange(next, Math.min(cursorPosRef.current, next.length), { focus: false });
                syncVoicesFromText(next);
                setShowAutoBarlinePreview(false);
            };


            // --- COPY CLIPBOARD ---
            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = abcText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 2000);
                } catch (err) {
                    console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            // --- Supabase Auth + Personal Library ---
            const [sessionChecked, setSessionChecked] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [showAccountMenu, setShowAccountMenu] = useState(false);
            const [authMode, setAuthMode] = useState('signin'); // signin | signup
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authBusy, setAuthBusy] = useState(false);
            const [authError, setAuthError] = useState('');
            const [authInfo, setAuthInfo] = useState('');
            const [libraryItems, setLibraryItems] = useState([]);
            const [libraryBusy, setLibraryBusy] = useState(false);
            const [currentSongId, setCurrentSongId] = useState('');
            const [cloudBusy, setCloudBusy] = useState(false);
            const [cloudDirty, setCloudDirty] = useState(false);
            const [lastCloudSavedAt, setLastCloudSavedAt] = useState('');
            const cloudSnapshotRef = useRef('');

            const openAuthModal = (mode = 'signin') => {
                setShowAccountMenu(false);
                setAuthMode(mode);
                setAuthError('');
                setAuthInfo('');
                setShowAuthModal(true);
            };

            const closeAuthModal = () => {
                setShowAuthModal(false);
                setShowAccountMenu(false);
                setAuthError('');
                setAuthInfo('');
                setAuthPassword('');
            };

            const formatLibraryTime = (iso) => {
                if (!iso) return '';
                try {
                    return new Date(iso).toLocaleString('vi-VN', {
                        hour: '2-digit',
                        minute: '2-digit',
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                    });
                } catch (e) {
                    return iso;
                }
            };

            const buildSongPayload = () => {
                const parsedTempo = parseInt(String(tempo || '').trim(), 10);
                const keyValue = getHeaderValue(abcText, 'K') || buildKeyString(keyTonic, keyMode);
                return {
                    title: String(title || '').trim() || 'Bài Hát Mới',
                    composer: String(composer || '').trim(),
                    meter: String(meter || '').trim() || '4/4',
                    tempo_bpm: Number.isFinite(parsedTempo) ? parsedTempo : null,
                    key_signature: String(keyValue || '').trim() || 'C',
                    abc_text: String(abcText || DEFAULT_ABC),

                        duration,

                    },
                };

            const buildSongSnapshot = (songLike) => {

                    meter: String(songLike.meter || '').trim(),
                    tempo_bpm: songLike.tempo_bpm == null ? null : Number(songLike.tempo_bpm),

            const isFreshDefaultScore = () => {

            const fetchLibrary = useCallback(async (userId) => {
                if (!supabaseClient || !userId) {

                    return;

                setLibraryBusy(true);

                        .select('id, title, composer, updated_at')
                        .eq('user_id', userId)
                        .order('updated_at', { ascending: false });

                    if (error) throw error;
                    setLibraryItems(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error('Load library failed', err);
                    showToast('Không tải được library');

                    setLibraryBusy(false);
                }
            }, [showToast]);

            const applySongToEditor = useCallback((song) => {
                const nextText = String(song?.abc_text || '').trim() ? String(song.abc_text) : DEFAULT_ABC;
                const editorState = (song && song.editor_state && typeof song.editor_state === 'object') ? song.editor_state : {};

                setTitle(song?.title || 'Bài Hát Mới');
                setComposer(song?.composer || 'Tác giả');
                setMeter(song?.meter || '4/4');
                setTempo(song?.tempo_bpm ? String(song.tempo_bpm) : '120');

                const keyParsed = parseKeyLine(song?.key_signature || getHeaderValue(nextText, 'K') || 'C');
                if (keyParsed && keyParsed.tonic) {
                    setKeyTonic(keyParsed.tonic);
                    setKeyMode(keyParsed.mode);
                    setKeySigInput(keyParsed.sigInput || KEY_SIG_HINT);
                    setKeySigDirty(!!keyParsed.sigDirty);
                } else {
                    setKeyTonic('C');
                    setKeyMode('major');
                    setKeySigInput(KEY_SIG_HINT);
                    setKeySigDirty(false);
                }

                if (editorState.lang) setLang(editorState.lang);
                if (editorState.theme && THEMES.includes(editorState.theme)) setTheme(editorState.theme);
                if (editorState.duration && DURATION_ORDER.includes(String(editorState.duration))) setDuration(String(editorState.duration));
                if (typeof editorState.isDotted === 'boolean') setIsDotted(editorState.isDotted);
                if (typeof editorState.activeVoice === 'number') setActiveVoice(editorState.activeVoice);

                applyTextChange(nextText, nextText.length, { focus: false, skipHistory: true });
                setTimeout(() => {
                    try { syncVoicesFromText(nextText); } catch (e) {}
                }, 0);

                setCurrentSongId(song?.id || '');
                setLastCloudSavedAt(song?.updated_at || '');
                cloudSnapshotRef.current = buildSongSnapshot({
                    title: song?.title || 'Bài Hát Mới',
                    composer: song?.composer || '',
                    meter: song?.meter || '4/4',
                    tempo_bpm: song?.tempo_bpm ?? null,
                    key_signature: song?.key_signature || 'C',

                    editor_state: editorState,

            const loadSongFromLibrary = useCallback(async (songId) => {
                if (!supabaseClient || !currentUser || !songId) return;

                try {

                    applySongToEditor(data);
                    showToast('Đã mở bài từ library');
                } catch (err) {
                    console.error('Load song failed', err);
                    showToast('Không mở được bài này');

                    setLibraryBusy(false);

            const handleLibrarySelect = async (songId) => {
                if (!songId) {

                    cloudSnapshotRef.current = '';

                if (songId === currentSongId) return;
                if (cloudDirty) {
                    const ok = window.confirm('Bản hiện tại có thay đổi chưa lưu lên library. Mở bài khác thì phần chưa save sẽ mất. Tiếp tục?');
                    if (!ok) return;

            const handleAuthSubmit = async () => {

                    setAuthError('Supabase client chưa sẵn sàng trong file này.');
                    return;

                const email = String(authEmail || '').trim();

                    setAuthError('Hãy nhập đủ email và password.');

                    setAuthError('Password nên có ít nhất 6 ký tự.');
                    return;

                        }
                    } else {

            useEffect(() => {

                        const { data } = await supabaseClient.auth.getSession();
                        if (!active) return;

                        setCurrentUser(user);
                        if (user?.email) setAuthEmail(user.email);
                        if (user?.id) await fetchLibrary(user.id);

                };
                init();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange(async (event, session) => {
                    const user = session?.user || null;
                    setCurrentUser(user);
                    setSessionChecked(true);
                    setAuthPassword('');

                    if (user?.email) setAuthEmail(user.email);

                    if (user?.id) {
                        await fetchLibrary(user.id);
                    } else {
                        setLibraryItems([]);
                        setCurrentSongId('');
                        setLastCloudSavedAt('');
                        cloudSnapshotRef.current = '';
                    }

                    if (event === 'SIGNED_OUT') {
                        showToast('Đã đăng xuất');
                    }
                });

                return () => {
                    active = false;
                    try { authListener?.subscription?.unsubscribe(); } catch (e) {}
                };
            }, [fetchLibrary, showToast]);

            useEffect(() => {
                if (!showAuthModal) return;
                const onKey = (e) => { if (e.key === 'Escape') closeAuthModal(); };
                document.addEventListener('keydown', onKey);
                return () => document.removeEventListener('keydown', onKey);
            }, [showAuthModal]);

            useEffect(() => {
                if (!currentUser) {
                    setCloudDirty(false);
                    return;
                }
                if (!currentSongId) {
                    setCloudDirty(!isFreshDefaultScore());
                    return;
                }
                const nextSnapshot = buildSongSnapshot(buildSongPayload());
                setCloudDirty(nextSnapshot !== cloudSnapshotRef.current);
            }, [currentUser, currentSongId, abcText, title, composer, meter, tempo, keyTonic, keyMode, keySigInput, keySigDirty, lang, theme, duration, isDotted, activeVoice, voices]);

            // --- RESET TEXT FORM ---
            const resetEditorToDefault = ({ skipHistory = false } = {}) => {
                setTitle('Bài Hát Mới');
                setComposer('Tác giả');
                setMeter('4/4');
                setDuration('4');
                setIsDotted(false);
                setTempo('120');

                setKeyTonic('C');
                setKeyMode('major');
                setKeySigInput(KEY_SIG_HINT);
                setKeySigDirty(false);

                setVoices([{ id: 1, clef: 'treble' }]);
                setActiveVoice(1);
                setShowAddVoice(false);

                applyTextChange(DEFAULT_ABC, DEFAULT_ABC.length, { focus: false, skipHistory });
                try { localStorage.setItem('abc_quickwriter_autosave_v1', DEFAULT_ABC); } catch (e) {}
            };

            const handleResetText = () => {
                const ok = window.confirm('Reset toàn bộ ABC về mặc định? (Hành động này sẽ ghi đè nội dung hiện tại)');
                if (!ok) return;
                resetEditorToDefault({ skipHistory: false });
                setCurrentSongId('');
                setLastCloudSavedAt('');
                cloudSnapshotRef.current = '';
            };

            const handleNewLibraryDraft = () => {
                if (cloudDirty) {
                    const ok = window.confirm('Bản hiện tại có thay đổi chưa lưu lên library. Tạo bài mới thì phần chưa save sẽ mất. Tiếp tục?');
                    if (!ok) return;
                }
                resetEditorToDefault({ skipHistory: false });
                setCurrentSongId('');
                setLastCloudSavedAt('');
                cloudSnapshotRef.current = '';
                showToast('Đã tạo bài mới');

            const handleSaveToLibrary = async () => {
                if (!currentUser) {
                    openAuthModal('signin');
                    showToast('Đăng nhập để lưu library');
                    return;
                }
                if (!supabaseClient) {
                    showToast('Supabase client chưa sẵn sàng');
                    return;
                }

                const payload = buildSongPayload();
                setCloudBusy(true);
                try {
                    let response;
                    if (currentSongId) {
                        response = await supabaseClient
                            .from('songs')
                            .update(payload)
                            .eq('id', currentSongId)
                            .eq('user_id', currentUser.id)
                            .select('*')
                            .single();
                    } else {
                        response = await supabaseClient
                            .from('songs')
                            .insert({ ...payload, user_id: currentUser.id })
                            .select('*')
                            .single();
                    }

                    const { data, error } = response;
                    if (error) throw error;

                    setCurrentSongId(data.id);
                    setLastCloudSavedAt(data.updated_at || '');
                    cloudSnapshotRef.current = buildSongSnapshot(data);
                    await fetchLibrary(currentUser.id);
                    showToast(currentSongId ? 'Đã cập nhật library' : 'Đã lưu vào library');
                } catch (err) {
                    console.error('Save library failed', err);
                    showToast(err?.message ? String(err.message) : 'Save to library thất bại');
                } finally {
                    setCloudBusy(false);
                }
            };


            // --- EXPORT HELPERS ---
            const makeSafeFileName = (base, ext) => {
                const raw = (base || 'abc_score').trim() || 'abc_score';
                const safe = raw
                    .normalize('NFKD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/[^a-zA-Z0-9-_ ]+/g, '')
                    .trim()
                    .replace(/\s+/g, '_')
                    .slice(0, 60) || 'abc_score';
                return safe + ext;
            };


            const getTitleFromAbc = (abc) => {
                const m = String(abc || '').match(/^T:\s*(.+)$/m);
                return m ? String(m[1] || '').trim() : '';
            };

            const getExportTitleRaw = () => {
                const abcTitle = getTitleFromAbc(abcTextRef.current);
                const st = String(title || '').trim();
                return (abcTitle || st || 'abc_score');
            };

            const getExportDocTitleSafe = () => {
                // ASCII-safe title for browser print/save-as-PDF default filename
                return makeSafeFileName(getExportTitleRaw(), '').trim() || 'abc_score';
            };

            const downloadBlob = (blob, filename) => {
                try {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 500);
                } catch (e) {
                    alert('Không thể tải file trên trình duyệt này.');
                }
            };

            const exportABC = () => {
                const fn = makeSafeFileName(getExportTitleRaw(), '.abc');
                const blob = new Blob([abcTextRef.current], { type: 'text/plain;charset=utf-8' });
                downloadBlob(blob, fn);
            };

            const exportMIDI = () => {
                if (!window.ABCJS?.synth?.getMidiFile) {
                    alert('MIDI export chưa sẵn sàng (ABCJS synth chưa tải xong).');
                    return;
                }
                try {
                    const out = window.ABCJS.synth.getMidiFile(abcTextRef.current, { midiOutputType: 'binary' });
                    const blob = Array.isArray(out) ? out[0] : out;

                    if (blob instanceof Blob) {
                        downloadBlob(blob, makeSafeFileName(getExportTitleRaw(), '.midi'));
                        return;
                    }

                    // Fallback: encoded data URI
                    const encOut = window.ABCJS.synth.getMidiFile(abcTextRef.current, { midiOutputType: 'encoded' });
                    const enc = Array.isArray(encOut) ? encOut[0] : encOut;
                    const a = document.createElement('a');
                    a.href = 'data:audio/midi,' + (enc || '');
                    a.download = makeSafeFileName(getExportTitleRaw(), '.midi');
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } catch (e) {
                    alert('Xuất MIDI bị lỗi. Hãy thử Render lại rồi export.');
                }
            };

            const exportPDF = () => {
                const html = renderAreaRef.current ? renderAreaRef.current.innerHTML : '';
                if (!html || html.trim().length === 0) {

                    return;

                const w = window.open('', '_blank');
                if (!w) {
                    alert('Trình duyệt chặn popup. Hãy cho phép popup rồi thử lại.');
                    return;
                }

                const docTitle = String(getExportDocTitleSafe() || 'Sheet_Music').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                w.document.write(`<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>${docTitle}</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body{margin:0;padding:18px;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:#0f172a;}
svg{width:100% !important;height:auto !important;display:block;}
.abcjs-page{max-width:920px;margin:0 auto;}
@media print{body{padding:0}.abcjs-page{max-width:none}}
</style>


</head>
<body>
<div class="abcjs-page">${html}</div>
<script>
window.onload=()=>{setTimeout(()=>{window.focus();window.print();},50);}
<\/script>
</body>
</html>`);
                w.document.close();
            };

            const exportMXL = async () => {

            const VN_DIACRITIC_RE = /[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/i;

            const translateText = (input, lang) => {

                    let out = input;
                    const entries = Object.entries(map).sort((a, b) => (b[0] || '').length - (a[0] || '').length);
                    for (const [from, to] of entries) {
                        if (!from) continue;
                        if (out.includes(from)) out = out.split(from).join(to);
                    }

                    // Generic rule-based fallback for dynamic errors
                    if (L === 'en') {
                        out = out
                            .replace(/Không đọc được/g, 'Cannot parse')
                            .replace(/Không parse được/g, 'Cannot parse')
                            .replace(/không hợp lệ/g, 'is invalid')
                            .replace(/Dùng:/g, 'Use:')

                            .replace(/Bị thiếu phách/g, 'Not enough beats')
                            .replace(/Hãy thử/g, 'Try')
                            .replace(/chưa hỗ trợ/g, "not supported yet");
                    } else if (L === 'jp') {
                        out = out
                            .replace(/Không đọc được/g, '解析できません')
                            .replace(/Không parse được/g, '解析できません')
                            .replace(/không hợp lệ/g, 'が不正です')
                            .replace(/Dùng:/g, '使用:')
                            .replace(/đúng format:/g, '期待する形式:')
                            .replace(/Trường độ/g, '音価')
